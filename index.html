<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lesson 1, 2 & 3 Learning App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fffaf5;
            user-select: none;
            overflow-x: hidden;
            touch-action: manipulation;
            color: #4a4a4a;
        }

        .btn-bounce:active { transform: scale(0.92); }

        .option-btn {
            transition: all 0.2s;
            box-shadow: 0 6px 0 #e5e5e5;
            -webkit-tap-highlight-color: transparent;
        }

        .option-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #e5e5e5;
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .highlight-text {
            color: #f97316;
            font-weight: 700;
            border-bottom: 4px solid #ffedd5;
            padding: 0 4px;
        }

        #audioUnlocker {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.98);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            perspective: 1000px;
        }

        .card {
            height: 110px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .card.flipped { transform: rotateY(180deg); }
        .card.matched { transform: rotateY(180deg); pointer-events: none; }
        .card.matched .card-back { border-color: #22c55e; background-color: #f0fdf4; }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card-front {
            background-color: #ffedd5;
            border: 3px solid #fdba74;
            color: #f97316;
            font-size: 3rem;
        }

        .card-back {
            background-color: white;
            border: 3px solid #fb923c;
            transform: rotateY(180deg);
            padding: 10px;
            text-align: center;
        }

        .word-chip {
            background: white; border: 2px solid #e2e8f0; border-radius: 12px;
            padding: 12px 20px; font-weight: bold; font-size: 1.25rem;
            box-shadow: 0 4px 0 #e2e8f0; cursor: pointer; transition: all 0.1s;
        }
        .word-chip:active { transform: translateY(2px); box-shadow: 0 2px 0 #e2e8f0; }
        .word-chip.used { opacity: 0.2; pointer-events: none; }
        
        .success-pulse { animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.03); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <audio id="bgm" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <div id="audioUnlocker">
        <div class="text-8xl mb-6">🎒</div>
        <h1 class="text-3xl font-bold text-orange-600 mb-2 uppercase tracking-tighter">Learning App</h1>
        <p class="text-gray-500 mb-8 font-bold text-lg">Lesson 1, 2 & 3</p>
        <button onclick="unlockAudio()" class="px-12 py-5 bg-orange-500 text-white rounded-full font-bold text-2xl shadow-xl btn-bounce uppercase tracking-wide">
            Start Learning
        </button>
    </div>

    <div id="app" class="max-w-md mx-auto w-full flex-grow flex flex-col shadow-2xl bg-white min-h-screen relative">
        <header class="p-4 flex items-center justify-between bg-orange-50 border-b-2 border-orange-100">
            <button id="homeBtn" class="text-orange-500 font-bold p-2 hidden">🏠 Home</button>
            <h1 id="headerTitle" class="text-xl font-bold text-orange-600 flex-grow text-center uppercase tracking-tight">English App</h1>
            <div class="w-10"></div>
        </header>

        <main id="mainContent" class="flex-grow p-6 flex flex-col">
            <div id="lessonMenuView" class="w-full space-y-4 fade-in text-center">
                <div class="py-2">
                    <div class="text-6xl mb-2">📚</div>
                    <h2 class="text-2xl font-bold text-gray-800 uppercase">Select Lesson</h2>
                </div>
                <div class="grid gap-4">
                    <button onclick="goToLesson(1)" class="p-6 bg-yellow-100 rounded-[30px] border-b-8 border-yellow-300 btn-bounce">
                        <div class="text-3xl mb-1">🏫</div>
                        <div class="text-xl font-bold text-yellow-800 uppercase">Lesson 1</div>
                    </button>
                    <button onclick="goToLesson(2)" class="p-6 bg-blue-100 rounded-[30px] border-b-8 border-blue-300 btn-bounce">
                        <div class="text-3xl mb-1">👦</div>
                        <div class="text-xl font-bold text-blue-800 uppercase">Lesson 2</div>
                    </button>
                    <button onclick="goToLesson(3)" class="p-6 bg-pink-100 rounded-[30px] border-b-8 border-pink-300 btn-bounce">
                        <div class="text-3xl mb-1">🏠</div>
                        <div class="text-xl font-bold text-pink-800 uppercase">Lesson 3</div>
                    </button>
                </div>
            </div>

            <div id="lesson1View" class="hidden w-full space-y-3 fade-in"></div>
            <div id="lesson2View" class="hidden w-full space-y-4 fade-in"></div>
            <div id="lesson3View" class="hidden w-full space-y-4 fade-in"></div>
            <div id="gameAreaView" class="hidden flex-grow flex flex-col fade-in"></div>
        </main>
    </div>

    <div id="feedback" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 px-10 py-5 rounded-3xl text-white font-bold text-3xl opacity-0 transition-opacity z-[999] pointer-events-none shadow-2xl"></div>

    <script>
        const views = ['lessonMenu', 'lesson1', 'lesson2', 'lesson3', 'gameArea'];
        let currentLesson = 1;
        let isAudioUnlocked = false;
        let bgmAudio = document.getElementById('bgm');

        // --- 完整数据配置 ---
        const introData = {
            boy: [
                { img: '👦', sentence: "My name is <span class='highlight-text'>______</span>.", full: "My name is Eden.", options: ['Effie', 'Eden', 'Janice'], correct: 'Eden' },
                { img: '5️⃣', sentence: "I am <span class='highlight-text'>___</span> years old.", full: "I am five years old.", options: ['four', 'five', 'six'], correct: 'five' },
                { img: '👦', sentence: "I am a <span class='highlight-text'>____</span>.", full: "I am a boy.", options: ['boy', 'girl'], correct: 'boy' }
            ],
            girl: [
                { img: '👧', sentence: "My name is <span class='highlight-text'>______</span>.", full: "My name is Effie.", options: ['Effie', 'Eden', 'Janice'], correct: 'Effie' },
                { img: '3️⃣', sentence: "I am <span class='highlight-text'>___</span> years old.", full: "I am three years old.", options: ['two', 'three', 'four'], correct: 'three' },
                { img: '👧', sentence: "I am a <span class='highlight-text'>____</span>.", full: "I am a girl.", options: ['boy', 'girl'], correct: 'girl' }
            ]
        };

        const greetingsData = [
            { icon: '☀️', prompt: "Good morning!", correct: "Good morning" },
            { icon: '🌤️', prompt: "Good afternoon!", correct: "Good afternoon" },
            { icon: '🌙', prompt: "Good night!", correct: "Good night" },
            { icon: '⚽', prompt: "Can I play with you?", correct: "Yes, you can" },
            { icon: '🧸', prompt: "Do you want to play with me?", correct: "Yes, I do" }
        ];

        const playTimeData = [
            { icon: '🧱', full: "I am playing with blocks.", correct: 'blocks' },
            { icon: '🧩', full: "I am playing with puzzles.", correct: 'puzzles' },
            { icon: '🛝', full: "I am playing on the slide.", correct: 'slide' },
            { icon: '🏖️', full: "I am playing with sand.", correct: 'sand' }
        ];

        const feelingsData = [
            { img: '😊', correct: 'Happy' }, { img: '👌', correct: 'Fine' },
            { img: '😢', correct: 'Sad' }, { img: '😰', correct: 'Nervous' }
        ];

        const colorsData = [
            { hex: '#FF0000', name: 'Red' }, { hex: '#0000FF', name: 'Blue' },
            { hex: '#FFFF00', name: 'Yellow' }, { hex: '#008000', name: 'Green' },
            { hex: '#FFA500', name: 'Orange' }, { hex: '#800080', name: 'Purple' }
        ];

        const bodyData = [
            { icon: '💆', full: "This is my head.", correct: 'head' },
            { icon: '💪', full: "These are my arms.", correct: 'arms' },
            { icon: '🦵', full: "These are my legs.", correct: 'legs' },
            { icon: '👣', full: "These are my feet.", correct: 'feet' }
        ];

        const familyData = [
            { name: 'father', icon: '👨' }, { name: 'mother', icon: '👩' }, { name: 'brother', icon: '👦' },
            { name: 'sister', icon: '👧' }, { name: 'grandfather', icon: '👴' }, { name: 'grandmother', icon: '👵' },
            { name: 'my pet', icon: '🐱' }
        ];

        const sentenceDataArr = [
            { photo: '👩‍🍳', words: ['I', 'cook with', 'my mother.'], full: "I cook with my mother." },
            { photo: '👨‍👦', words: ['I', 'play ball with', 'my father.'], full: "I play ball with my father." },
            { photo: '👵👴', words: ['I', 'read with', 'my grandparents.'], full: "I read with my grandparents." },
            { photo: '👧🎨', words: ['I', 'draw with', 'my sister.'], full: "I draw with my sister." },
            { photo: '👦👶', words: ['I', 'play with my', 'baby brother.'], full: "I play with my baby brother." },
            { photo: '👨‍👩‍👧‍👦', words: ['I', 'eat with', 'my family.'], full: "I eat with my family." }
        ];

        let introState = { gender: null, step: 0 };
        let greetingIdx = 0, playStep = 0, quizIdx = 0, colorIdx = 0, bodyStep = 0, familyStep = 0;
        let flipCards = [], flippedIndices = [], matchedCount = 0, memoryPageIdx = 0;
        let sentIdx = 0, buildWords = [];

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function unlockAudio() {
            document.getElementById('audioUnlocker').style.display = 'none';
            isAudioUnlocked = true;
            playBGM();
            speak("Welcome! Let's start.");
        }

        function playBGM() { if (isAudioUnlocked) { bgmAudio.volume = 0.1; bgmAudio.play().catch(e => {}); } }
        function stopBGM() { bgmAudio.pause(); }

        function speak(text, callback) {
            if (!isAudioUnlocked) { if(callback) callback(); return; }
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance();
                let processedText = text.replace(/\bI\b/g, 'i');
                msg.text = processedText;
                msg.lang = 'en-GB'; 
                msg.rate = 0.45; // 进一步降低语速
                msg.pitch = 1.1; 
                let done = false;
                msg.onend = () => { if(!done){ done=true; if(callback) callback(); }};
                msg.onerror = () => { if(!done){ done=true; if(callback) callback(); }};
                window.speechSynthesis.speak(msg);
            } else if (callback) callback();
        }

        function showFeedback(text, colorClass) {
            const fb = document.getElementById('feedback');
            fb.innerText = text;
            fb.className = `fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 px-10 py-5 rounded-full text-white font-bold text-3xl transition-all ${colorClass} opacity-100 z-[999] shadow-2xl`;
            setTimeout(() => fb.classList.replace('opacity-100', 'opacity-0'), 1500);
        }

        function goToLesson(n) {
            currentLesson = n;
            renderLessonSubmenu(n);
            showView('lesson' + n);
        }

        function showView(viewName) {
            views.forEach(v => { const el = document.getElementById(v + 'View'); if(el) el.classList.add('hidden'); });
            const target = document.getElementById(viewName + 'View');
            if(target) target.classList.remove('hidden');
            document.getElementById('homeBtn').classList.toggle('hidden', viewName === 'lessonMenu');
            if (viewName.includes('lesson')) { playBGM(); document.getElementById('headerTitle').innerText = "Learning"; }
            else { stopBGM(); document.getElementById('headerTitle').innerText = "Playing"; }
        }

        document.getElementById('homeBtn').onclick = () => {
            window.speechSynthesis.cancel();
            const activeView = views.find(v => { 
                const el = document.getElementById(v + 'View'); 
                return el && !el.classList.contains('hidden'); 
            });
            if (activeView && activeView.includes('lesson')) showView('lessonMenu');
            else showView('lesson' + currentLesson);
        };

        function renderLessonSubmenu(n) {
            const view = document.getElementById('lesson' + n + 'View');
            if (!view) return;
            if (n === 1) {
                view.innerHTML = `
                    <div class="grid gap-3 pt-4">
                        ${renderMenuBtn('intro', '👋', 'Self Intro', 'yellow')}
                        ${renderMenuBtn('greetings', '💬', 'Greetings', 'purple')}
                        ${renderMenuBtn('playTime', '🧸', 'Play Time', 'green')}
                        ${renderMenuBtn('quiz', '😊', 'Feelings', 'blue')}
                        ${renderMenuBtn('colors', '🌈', 'Colors', 'pink')}
                    </div>`;
            } else if (n === 2) {
                view.innerHTML = `
                    <div class="grid gap-4 pt-4">
                        ${renderMenuBtn('bodyParts', '💪', 'My Body', 'blue')}
                        ${renderMenuBtn('myFace', '👦', 'My Face', 'orange')}
                    </div>`;
            } else if (n === 3) {
                view.innerHTML = `
                    <div class="grid gap-3 pt-4">
                        ${renderMenuBtn('familyMembers', '👨‍👩‍👧‍👦', 'Family', 'pink')}
                        ${renderMenuBtn('familyFlip', '🃏', 'Flip Game', 'orange')}
                        ${renderMenuBtn('familyFun', '🍲', 'Family Fun', 'green')}
                    </div>`;
            }
        }

        function renderMenuBtn(game, emoji, title, color) {
            return `<button onclick="startGame('${game}')" class="w-full p-6 bg-white border-2 border-gray-100 rounded-2xl flex items-center space-x-4 btn-bounce text-left shadow-sm">
                <span class="text-4xl">${emoji}</span>
                <div class="font-bold text-xl text-gray-700 uppercase">${title}</div>
            </button>`;
        }

        function startGame(game) {
            showView('gameArea');
            const container = document.getElementById('gameAreaView');
            container.innerHTML = ""; 
            if (game === 'intro') { introState = { gender: null, step: 0 }; renderIntro(); }
            else if (game === 'greetings') { greetingIdx = 0; renderGreetings(); }
            else if (game === 'playTime') { playStep = 0; renderPlayTime(); }
            else if (game === 'quiz') { quizIdx = 0; renderQuiz(); }
            else if (game === 'colors') { colorIdx = 0; renderColors(); }
            else if (game === 'bodyParts') { bodyStep = 0; renderBody(); }
            else if (game === 'myFace') { renderFacePuzzle(); }
            else if (game === 'familyMembers') { familyStep = 0; renderFamilyMembers(); }
            else if (game === 'familyFlip') { memoryPageIdx = 0; renderFlipGame(); }
            else if (game === 'familyFun') { sentIdx = 0; renderSentences(); }
        }

        // --- 游戏内容渲染函数 ---

        function renderIntro() {
            const container = document.getElementById('gameAreaView');
            if (introState.gender === null) {
                container.innerHTML = `<div class="text-center space-y-12 py-12 flex-grow flex flex-col justify-center animate-fade-in"><h2 class="text-3xl font-bold text-gray-700 uppercase">Are you a boy or a girl?</h2><div class="flex justify-around items-center"><button onclick="introState.gender='boy'; renderIntro();" class="flex flex-col items-center btn-bounce"><div class="text-8xl p-8 bg-blue-50 rounded-full border-4 border-blue-200">👦</div><span class="mt-4 font-bold text-blue-600 text-2xl">Boy</span></button><button onclick="introState.gender='girl'; renderIntro();" class="flex flex-col items-center btn-bounce"><div class="text-8xl p-8 bg-pink-50 rounded-full border-4 border-pink-200">👧</div><span class="mt-4 font-bold text-pink-600 text-2xl">Girl</span></button></div></div>`;
                speak("Are you a boy or a girl?");
            } else {
                const data = introData[introState.gender][introState.step];
                container.innerHTML = `<div class="text-center space-y-6 py-4 flex flex-col h-full animate-fade-in"><div class="text-8xl p-8 bg-white rounded-full mx-auto border-2 border-orange-50">${data.img}</div><div class="p-6 bg-orange-50 rounded-[30px] mx-2 border-2 border-orange-100"><p id="introSent" class="text-2xl font-bold">${data.sentence}</p></div><div class="grid gap-4 px-4 mt-auto">${shuffleArray(data.options).map(opt => `<button onclick="checkIntro('${opt}')" class="option-btn p-5 bg-white border-2 rounded-2xl font-bold uppercase text-xl">${opt}</button>`).join('')}</div></div>`;
                speak(data.full);
            }
        }
        function checkIntro(opt) {
            const data = introData[introState.gender][introState.step];
            if (opt.toLowerCase() === data.correct.toLowerCase()) {
                document.getElementById('introSent').innerHTML = data.full;
                speak(data.full, () => { setTimeout(() => { introState.step++; if (introState.step < 3) renderIntro(); else showView('lesson1'); }, 1200); });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }

        function renderGreetings() {
            const step = greetingsData[greetingIdx];
            document.getElementById('gameAreaView').innerHTML = `<div class="text-center py-10 flex flex-col h-full animate-fade-in"><div class="text-9xl mb-10">${step.icon}</div><div class="text-3xl font-bold mb-10 text-purple-700 uppercase">${step.prompt}</div><div class="flex flex-col gap-4 mt-auto">${shuffleArray([step.correct, "No thank you"]).map(o => `<button onclick="checkGreeting('${o}', '${step.correct}')" class="p-6 bg-white border-2 rounded-2xl font-bold text-xl uppercase shadow-md option-btn">${o}</button>`).join('')}</div></div>`;
            speak(step.prompt);
        }
        function checkGreeting(opt, correct) {
            if (opt.toLowerCase() === correct.toLowerCase()) {
                showFeedback("Great!", "bg-green-500");
                speak(correct, () => { greetingIdx++; if (greetingIdx < 5) renderGreetings(); else showView('lesson1'); });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }

        function renderPlayTime() {
            const step = playTimeData[playStep];
            document.getElementById('gameAreaView').innerHTML = `<div class="text-center py-10 flex flex-col h-full animate-fade-in"><div class="text-9xl mb-10">${step.icon}</div><div class="text-3xl font-bold mb-10 text-green-700 uppercase">${step.full}</div><div class="grid grid-cols-2 gap-4 mt-auto">${shuffleArray([step.correct, "ball"]).map(o => `<button onclick="checkPlay('${o}', '${step.correct}')" class="p-6 bg-white border-2 rounded-2xl font-bold text-xl uppercase shadow-md option-btn">${o}</button>`).join('')}</div></div>`;
            speak(step.full);
        }
        function checkPlay(opt, correct) {
            if (opt.toLowerCase() === correct.toLowerCase()) {
                playStep++; if (playStep < 4) renderPlayTime(); else showView('lesson1');
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }

        function renderQuiz() {
            const q = feelingsData[quizIdx];
            document.getElementById('gameAreaView').innerHTML = `<div class="text-center py-10 flex flex-col items-center animate-fade-in"><div class="text-9xl mb-10 bg-blue-50 w-48 h-48 flex items-center justify-center rounded-full">${q.img}</div><div class="text-3xl font-bold mb-10 text-blue-700 uppercase">How do you feel?</div><div class="flex flex-col gap-4 w-full">${shuffleArray([q.correct, "Angry"]).map(o => `<button onclick="checkQuiz('${o}', '${q.correct}')" class="p-6 bg-white border-2 rounded-3xl font-bold text-2xl uppercase shadow-lg option-btn">${o}</button>`).join('')}</div></div>`;
            speak("How do you feel?");
        }
        function checkQuiz(opt, correct) {
            if (opt.toLowerCase() === correct.toLowerCase()) {
                quizIdx++; if (quizIdx < 4) renderQuiz(); else showView('lesson1');
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }

        function renderColors() {
            const c = colorsData[colorIdx];
            document.getElementById('gameAreaView').innerHTML = `<div class="text-center py-10 flex flex-col items-center animate-fade-in"><div class="w-48 h-48 rounded-full mb-10 border-8 border-white shadow-lg" style="background:${c.hex}"></div><div class="text-3xl font-bold mb-10 text-pink-700 uppercase">What color is this?</div><div class="flex flex-col gap-4 w-full">${shuffleArray([c.name, "Black"]).map(o => `<button onclick="checkColor('${o}', '${c.name}')" class="p-6 bg-white border-2 rounded-3xl font-bold text-2xl uppercase shadow-lg option-btn">${o}</button>`).join('')}</div></div>`;
            speak("What color is this?");
        }
        function checkColor(opt, correct) {
            if (opt.toLowerCase() === correct.toLowerCase()) {
                colorIdx++; if (colorIdx < 6) renderColors(); else showView('lesson1');
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }

        function renderBody() {
            const step = bodyData[bodyStep];
            document.getElementById('gameAreaView').innerHTML = `<div class="text-center py-10 flex flex-col items-center h-full animate-fade-in"><div class="text-9xl mb-10 p-10 bg-blue-50 rounded-full">${step.icon}</div><div class="text-3xl font-bold mb-10 text-blue-800 uppercase">${step.full}</div><div class="grid grid-cols-2 gap-4 mt-auto w-full">${shuffleArray([step.correct, "eye"]).map(o => `<button onclick="checkBody('${o}', '${step.correct}')" class="p-6 bg-white border-2 rounded-2xl font-bold text-xl uppercase shadow-md option-btn">${o}</button>`).join('')}</div></div>`;
            speak(step.full);
        }
        function checkBody(opt, correct) {
            if (opt.toLowerCase() === correct.toLowerCase()) {
                bodyStep++; if (bodyStep < 4) renderBody(); else showView('lesson2');
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }

        function renderFacePuzzle() {
            document.getElementById('gameAreaView').innerHTML = `<div class="flex flex-col items-center py-10 animate-fade-in"><div class="relative w-64 h-64 bg-orange-100 rounded-full border-4 border-orange-200 flex items-center justify-center mb-10"><div class="absolute top-1/4 left-1/4 text-5xl">👀</div><div class="absolute top-1/4 right-1/4 text-5xl">👀</div><div class="absolute top-1/2 text-5xl">👃</div><div class="absolute bottom-1/4 text-5xl animate-bounce">👄</div></div><p class="text-2xl font-bold text-orange-600 uppercase mb-8">Face Done!</p><button onclick="showView('lesson2')" class="px-10 py-5 bg-orange-500 text-white rounded-full font-bold shadow-xl uppercase">Back</button></div>`;
            speak("This is my face. Eyes, nose and mouth.");
        }

        function renderFamilyMembers() {
            const item = familyData[familyStep];
            const other = familyData.filter(i => i.name !== item.name);
            const wrong = other[Math.floor(Math.random() * other.length)].name;
            document.getElementById('gameAreaView').innerHTML = `<div class="text-center py-10 flex flex-col items-center h-full animate-fade-in"><p class="text-gray-400 font-bold uppercase text-xs mb-4">Who is this? ${familyStep + 1}/7</p><div class="text-9xl mb-10 p-10 bg-pink-50 rounded-full shadow-lg border-4 border-pink-100">${item.icon}</div><div class="grid grid-cols-1 gap-4 mt-auto w-full">${shuffleArray([item.name, wrong]).map(opt => `<button onclick="checkFamilyMember('${opt}', '${item.name}')" class="p-6 bg-white border-2 rounded-2xl font-bold text-2xl uppercase shadow-md option-btn">${opt}</button>`).join('')}</div></div>`;
            speak(item.name);
        }
        function checkFamilyMember(opt, correct) {
            if (opt.toLowerCase() === correct.toLowerCase()) {
                showFeedback("Correct!", "bg-green-500");
                speak(correct, () => { familyStep++; if (familyStep < 7) renderFamilyMembers(); else showView('lesson3'); });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }

        function renderFlipGame() {
            matchedCount = 0; flippedIndices = [];
            const itemsPerPage = 3;
            const start = memoryPageIdx * itemsPerPage;
            let pageItems = familyData.slice(start, start + itemsPerPage);
            if (pageItems.length > 0 && pageItems.length < itemsPerPage) {
                const pool = familyData.filter(item => !pageItems.includes(item));
                pageItems = [...pageItems, ...shuffleArray(pool).slice(0, itemsPerPage - pageItems.length)];
            }
            const cards = [];
            pageItems.forEach(item => { cards.push({ type: 'icon', val: item.icon, name: item.name }, { type: 'name', val: item.name, name: item.name }); });
            flipCards = shuffleArray(cards);
            document.getElementById('gameAreaView').innerHTML = `<div class="text-center py-2 flex flex-col h-full animate-fade-in"><p class="text-gray-400 font-bold uppercase text-xs mb-4">Page ${memoryPageIdx + 1}/3</p><div class="memory-grid" id="memoryGrid">${flipCards.map((card, i) => `<div class="card" id="card-${i}" onclick="handleFlip(${i})"><div class="card-face card-front">❓</div><div class="card-face card-back"><div class="${card.type === 'icon' ? 'text-6xl' : 'text-lg font-bold text-orange-800 uppercase'}">${card.val}</div></div></div>`).join('')}</div></div>`;
            speak("Match the cards!");
        }
        function handleFlip(idx) {
            const cardEl = document.getElementById(`card-${idx}`);
            if (cardEl.classList.contains('flipped') || cardEl.classList.contains('matched') || flippedIndices.length === 2) return;
            cardEl.classList.add('flipped');
            flippedIndices.push(idx);
            speak(flipCards[idx].name);
            if (flippedIndices.length === 2) {
                const [i1, i2] = flippedIndices;
                if (flipCards[i1].name === flipCards[i2].name) {
                    setTimeout(() => {
                        document.getElementById(`card-${i1}`).classList.add('matched');
                        document.getElementById(`card-${i2}`).classList.add('matched');
                        matchedCount++; flippedIndices = [];
                        if (matchedCount === 3) {
                            setTimeout(() => { memoryPageIdx++; if (memoryPageIdx < 3) renderFlipGame(); else showView('lesson3'); }, 1200);
                        }
                    }, 600);
                } else {
                    setTimeout(() => { document.getElementById(`card-${i1}`).classList.remove('flipped'); document.getElementById(`card-${i2}`).classList.remove('flipped'); flippedIndices = []; }, 1000);
                }
            }
        }

        function renderSentences() {
            const data = sentenceDataArr[sentIdx]; buildWords = [];
            const shuffled = shuffleArray([...data.words]);
            document.getElementById('gameAreaView').innerHTML = `<div class="text-center space-y-4 py-2 flex flex-col h-full animate-fade-in"><p class="text-gray-400 font-bold uppercase text-xs">Sentence ${sentIdx + 1}/6</p><div class="text-9xl p-4 bg-white rounded-3xl shadow-md border-2 border-green-50 mx-auto">${data.photo}</div><div class="p-6 bg-green-50 rounded-[30px] border-2 border-green-100 min-h-[120px] flex flex-wrap items-center justify-center gap-3" id="sentOutput"><span class="text-gray-300 italic">Tap words...</span></div><div class="flex flex-wrap justify-center gap-3 mt-4">${shuffled.map(w => `<button onclick="addWordToSent(this, '${w.replace(/'/g, "\\'")}')" class="word-chip">${w}</button>`).join('')}</div></div>`;
            speak(data.full);
        }
        function addWordToSent(btn, word) {
            btn.classList.add('used'); buildWords.push(word);
            const output = document.getElementById('sentOutput');
            if (buildWords.length === 1) output.innerHTML = '';
            output.innerHTML += `<span class="text-2xl font-bold text-green-800 px-1 animate-fade-in">${word}</span>`;
            speak(word);
            if (buildWords.length === sentenceDataArr[sentIdx].words.length) {
                if (buildWords.join(' ') === sentenceDataArr[sentIdx].words.join(' ')) {
                    output.classList.add('success-pulse', 'bg-green-100');
                    speak(sentenceDataArr[sentIdx].full, () => { setTimeout(() => { sentIdx++; if (sentIdx < 6) renderSentences(); else showView('lesson3'); }, 1800); });
                } else { showFeedback("Try again!", "bg-red-400"); setTimeout(renderSentences, 1200); }
            }
        }

        showView('lessonMenu');
    </script>
</body>
</html>
