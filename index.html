<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lesson 1, 2, 3 & 4 Learning App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fffaf5;
            user-select: none;
            overflow-x: hidden;
            touch-action: manipulation;
            color: #4a4a4a;
        }

        .btn-bounce:active { transform: scale(0.92); }

        .option-btn {
            transition: all 0.2s;
            box-shadow: 0 6px 0 #e5e5e5;
            -webkit-tap-highlight-color: transparent;
        }

        .option-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #e5e5e5;
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #audioUnlocker {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.98);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        /* 消消乐方块样式 */
        .match-tile {
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 5px 0 #e2e8f0;
            border: 2px solid #e2e8f0;
            background: white;
            padding: 8px;
        }
        .match-tile.selected {
            border-color: #fb923c;
            background-color: #fff7ed;
            transform: translateY(-4px);
            box-shadow: 0 8px 0 #fdba74;
        }
        .match-tile.hidden {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
        }

        .word-chip {
            background: white; border: 2px solid #e2e8f0; border-radius: 12px;
            padding: 18px 25px; font-weight: bold; font-size: 1.5rem;
            min-width: 80px;
            box-shadow: 0 4px 0 #e2e8f0; cursor: pointer; transition: all 0.1s;
            text-align: center;
        }
        .word-chip.used { opacity: 0.1; pointer-events: none; transform: scale(0.9); }
        
        .letter-chip {
            background: white; border: 2px solid #e2e8f0; border-radius: 10px;
            padding: 12px; font-weight: bold; font-size: 1.6rem;
            min-width: 50px; text-align: center;
            box-shadow: 0 4px 0 #e2e8f0; cursor: pointer; transition: all 0.1s;
        }
        .letter-chip.used { opacity: 0.1; pointer-events: none; transform: scale(0.9); }

        .success-pulse { animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.03); } }

        /* --- My Face 定位 --- */
        .face-part { 
            position: absolute;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            opacity: 0; 
            transform: scale(0.2); 
            pointer-events: none;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .face-part.visible { opacity: 1; transform: scale(1); }
        
        .hair-svg { width: 110%; top: -14%; left: -5%; z-index: 25; }
        .eyes-container { top: 30%; width: 62%; left: 19%; display: flex; justify-content: space-between; z-index: 15; }
        .ears-container { top: 34%; width: 114%; left: -7%; display: flex; justify-content: space-between; z-index: 5; }
        .nose-part { top: 48%; left: 0; right: 0; margin: 0 auto; width: fit-content; z-index: 16; }
        .tongue-part { top: 68%; left: 0; right: 0; margin: 0 auto; width: fit-content; z-index: 17; } 

    </style>
</head>
<body class="min-h-screen flex flex-col">

    <audio id="bgm" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <div id="audioUnlocker">
        <div class="text-8xl mb-6">🎒</div>
        <h1 class="text-3xl font-bold text-orange-600 mb-2 uppercase tracking-tighter">Learning App</h1>
        <p class="text-gray-500 mb-8 font-bold text-lg">Lessons 1 - 4</p>
        <button onclick="unlockAudio()" class="px-12 py-5 bg-orange-500 text-white rounded-full font-bold text-2xl shadow-xl btn-bounce uppercase tracking-wide">
            Start Learning
        </button>
    </div>

    <div id="app" class="max-w-md mx-auto w-full flex-grow flex flex-col shadow-2xl bg-white min-h-screen relative">
        <header class="p-4 flex items-center justify-between bg-orange-50 border-b-2 border-orange-100">
            <button id="homeBtn" class="text-orange-500 font-bold p-2 hidden">🏠 Home</button>
            <h1 id="headerTitle" class="text-xl font-bold text-orange-600 flex-grow text-center uppercase tracking-tight">English App</h1>
            <div class="w-10"></div>
        </header>

        <main id="mainContent" class="flex-grow p-6 flex flex-col">
            <div id="lessonMenuView" class="w-full space-y-4 fade-in text-center">
                <div class="py-2">
                    <div class="text-6xl mb-2">📚</div>
                    <h2 class="text-2xl font-bold text-gray-800 uppercase">Select Lesson</h2>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="goToLesson(1)" class="p-4 bg-yellow-100 rounded-[25px] border-b-4 border-yellow-300 btn-bounce">
                        <div class="text-2xl mb-1">🏫</div>
                        <div class="text-lg font-bold text-yellow-800 uppercase">L1</div>
                    </button>
                    <button onclick="goToLesson(2)" class="p-4 bg-blue-100 rounded-[25px] border-b-4 border-blue-300 btn-bounce">
                        <div class="text-2xl mb-1">👦</div>
                        <div class="text-lg font-bold text-blue-800 uppercase">L2</div>
                    </button>
                    <button onclick="goToLesson(3)" class="p-4 bg-pink-100 rounded-[25px] border-b-4 border-pink-300 btn-bounce">
                        <div class="text-2xl mb-1">🏠</div>
                        <div class="text-lg font-bold text-pink-800 uppercase">L3</div>
                    </button>
                    <button onclick="goToLesson(4)" class="p-4 bg-orange-100 rounded-[25px] border-b-4 border-orange-300 btn-bounce">
                        <div class="text-2xl mb-1">🎒</div>
                        <div class="text-lg font-bold text-orange-800 uppercase">L4</div>
                    </button>
                </div>
            </div>

            <div id="lesson1View" class="hidden w-full space-y-3 fade-in"></div>
            <div id="lesson2View" class="hidden w-full space-y-4 fade-in"></div>
            <div id="lesson3View" class="hidden w-full space-y-4 fade-in"></div>
            <div id="lesson4View" class="hidden w-full space-y-4 fade-in"></div>
            <div id="gameAreaView" class="hidden flex-grow flex flex-col fade-in"></div>
        </main>
    </div>

    <div id="feedback" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 px-10 py-5 rounded-3xl text-white font-bold text-3xl opacity-0 transition-opacity z-[999] pointer-events-none shadow-2xl"></div>

    <script>
        const views = ['lessonMenu', 'lesson1', 'lesson2', 'lesson3', 'lesson4', 'gameArea'];
        let isAudioUnlocked = false;
        let bgmAudio = document.getElementById('bgm');

        // --- 数据集 ---
        const rawIntroData = {
            boy: [
                { img: '👦', sentence: "My name is <span class='highlight-text'>______</span>.", options: ['Effie', 'Eden', 'Janice'], correct: 'Eden' },
                { img: '5️⃣', sentence: "I am <span class='highlight-text'>___</span> years old.", options: ['four', 'five', 'six'], correct: 'five' },
                { img: '👦', sentence: "I am a <span class='highlight-text'>____</span>.", options: ['boy', 'girl'], correct: 'boy' }
            ],
            girl: [
                { img: '👧', sentence: "My name is <span class='highlight-text'>______</span>.", options: ['Effie', 'Eden', 'Janice'], correct: 'Effie' },
                { img: '3️⃣', sentence: "I am <span class='highlight-text'>___</span> years old.", options: ['two', 'three', 'four'], correct: 'three' },
                { img: '👧', sentence: "I am a <span class='highlight-text'>____</span>.", options: ['boy', 'girl'], correct: 'girl' }
            ]
        };

        const rawGreetingsData = [
            { icon: '☀️', prompt: "Good morning!", correct: "Good morning" },
            { icon: '🌤️', prompt: "Good afternoon!", correct: "Good afternoon" },
            { icon: '🌙', prompt: "Good night!", correct: "Good night" },
            { icon: '⚽', prompt: "Can I play with you?", correct: "Yes, you can" },
            { icon: '🧸', prompt: "Do you want to play with me?", correct: "Yes, I do" }
        ];

        const rawPlayTimeData = [
            { icon: '🧱', display: "I am playing with _____", full: "I am playing with blocks.", correct: 'blocks' },
            { icon: '🧩', display: "I am playing with _____", full: "I am playing with puzzles.", correct: 'puzzles' },
            { icon: '🛝', display: "I am playing on the _____", full: "I am playing on the slide.", correct: 'slide' },
            { icon: '🪣', display: "I am playing with _____", full: "I am playing with sand.", correct: 'sand' }
        ];

        const rawFeelingsData = [
            { img: '😊', correct: 'Happy' }, { img: '👌', correct: 'Fine' },
            { img: '😢', correct: 'Sad' }, { img: '😰', correct: 'Nervous' }
        ];

        const rawColorsData = [
            { hex: '#FF0000', name: 'Red' }, { hex: '#0000FF', name: 'Blue' },
            { hex: '#FFFF00', name: 'Yellow' }, { hex: '#008000', name: 'Green' },
            { hex: '#FFA500', name: 'Orange' }, { hex: '#800080', name: 'Purple' }
        ];

        const rawBodyData = [
            { icon: '👤', correct: 'head' },
            { icon: '💪', correct: 'arms' },
            { icon: '🦵', correct: 'leg' },
            { icon: '👣', correct: 'feet' },
            { icon: '👀', correct: 'eyes' },
            { icon: '👂', correct: 'ears' },
            { icon: '👃', correct: 'nose' },
            { icon: '👄', correct: 'mouth' },
            { icon: '✋', correct: 'hand' },
            { icon: '🦵', correct: 'knee' }
        ];

        const rawFamilyData = [
            { name: 'father', icon: '👨' }, { name: 'mother', icon: '👩' }, { name: 'brother', icon: '👦' },
            { name: 'sister', icon: '👧' }, { name: 'grandfather', icon: '👴' }, { name: 'grandmother', icon: '👵' },
            { name: 'my pet', icon: '🐱' }
        ];

        const rawSentenceDataArr = [
            { photo: '👩‍🍳', words: ['I', 'cook with', 'my mother.'], full: "I cook with my mother." },
            { photo: '👨‍👦', words: ['I', 'play ball with', 'my father.'], full: "I play ball with my father." },
            { photo: '👵👴', words: ['I', 'read with', 'my grandparents.'], full: "I read with my grandparents." },
            { photo: '👧🎨', words: ['I', 'draw with', 'my sister.'], full: "I draw with my sister." },
            { photo: '👦👶', words: ['I', 'play with my', 'baby brother.'], full: "I play with my baby brother." },
            { photo: '👨‍👩‍👧‍👦', words: ['I', 'eat with', 'my family.'], full: "I eat with my family." }
        ];

        const rawSchoolData = [
            { name: 'notebook', icon: '📓' },
            { name: 'pencil', icon: '✏️' },
            { name: 'ruler', icon: '📏' },
            { name: 'school bag', icon: '🎒' },
            { name: 'pen', icon: '🖋️' },
            { name: 'eraser', icon: '🧼' },
            { name: 'book', icon: '📖' },
            { name: 'crayon', icon: '🖍️' },
            { name: 'pencil case', icon: '👝' }
        ];

        let activeData = [];
        let introState = { gender: null, step: 0 };
        let greetingIdx = 0, playStep = 0, quizIdx = 0, colorIdx = 0, bodyStep = 0, familyStep = 0, faceStep = 0, schoolStep = 0, builderStep = 0;
        let currentFaceParts = [];
        let flipCards = [], flippedIndices = [], matchedCount = 0, memoryPageIdx = 0;
        let sentIdx = 0, buildWords = [], buildLetters = [];
        let matchSelected = null;

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function unlockAudio() {
            document.getElementById('audioUnlocker').style.display = 'none';
            isAudioUnlocked = true;
            playBGM();
            speak("Welcome! Let's start.");
            showView('lessonMenu');
        }

        function playBGM() { if (isAudioUnlocked) { bgmAudio.volume = 0.1; bgmAudio.play().catch(e => {}); } }
        function stopBGM() { bgmAudio.pause(); }

        function speak(text, callback) {
            if (!isAudioUnlocked) { if(callback) callback(); return; }
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance();
                let processedText = text.replace(/\bI\b/g, 'i');
                msg.text = processedText;
                msg.lang = 'en-GB'; 
                msg.rate = 0.8; 
                msg.pitch = 1.1; 
                let done = false;
                msg.onend = () => { if(!done){ done=true; if(callback) callback(); }};
                window.speechSynthesis.speak(msg);
            } else if (callback) callback();
        }

        function showFeedback(text, colorClass) {
            const fb = document.getElementById('feedback');
            fb.innerText = text;
            fb.className = `fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 px-10 py-5 rounded-full text-white font-bold text-3xl transition-all ${colorClass} opacity-100 z-[999] shadow-2xl`;
            setTimeout(() => fb.classList.replace('opacity-100', 'opacity-0'), 1500);
        }

        function goToLesson(n) {
            currentLesson = n;
            renderLessonSubmenu(n);
            showView('lesson' + n);
        }

        function showView(viewName) {
            views.forEach(v => {
                const el = document.getElementById(v + 'View');
                if (el) el.classList.add('hidden');
            });
            const target = document.getElementById(viewName + 'View');
            if (target) target.classList.remove('hidden');
            document.getElementById('homeBtn').classList.toggle('hidden', viewName === 'lessonMenu');
            if (viewName.includes('lesson')) { playBGM(); document.getElementById('headerTitle').innerText = "Learning"; }
            else { stopBGM(); document.getElementById('headerTitle').innerText = "Playing"; }
        }

        document.getElementById('homeBtn').onclick = () => {
            window.speechSynthesis.cancel();
            showView('lessonMenu');
        };

        function renderLessonSubmenu(n) {
            const view = document.getElementById('lesson' + n + 'View');
            if (!view) return;
            if (n === 1) {
                view.innerHTML = `<div class="grid gap-3 pt-4">${renderMenuBtn('intro', '👋', 'Self Intro', 'yellow')}${renderMenuBtn('greetings', '💬', 'Greetings', 'purple')}${renderMenuBtn('playTime', '🧸', 'Play Time', 'green')}${renderMenuBtn('quiz', '😊', 'Feelings', 'blue')}${renderMenuBtn('colors', '🌈', 'Colors', 'pink')}</div>`;
            } else if (n === 2) {
                view.innerHTML = `<div class="grid gap-4 pt-4">${renderMenuBtn('bodyParts', '💪', 'My Body', 'blue')}${renderMenuBtn('myFace', '👦', 'My Face', 'orange')}${renderMenuBtn('bodyMatch', '🔀', 'Body Match', 'green')}</div>`;
            } else if (n === 3) {
                view.innerHTML = `<div class="grid gap-3 pt-4">${renderMenuBtn('familyMembers', '👨‍👩‍👧‍👦', 'Family', 'pink')}${renderMenuBtn('familyFlip', '🃏', 'Flip Game', 'orange')}${renderMenuBtn('familyFun', '🍲', 'Family Fun', 'green')}</div>`;
            } else if (n === 4) {
                view.innerHTML = `<div class="grid gap-4 pt-4">${renderMenuBtn('schoolSupplies', '📐', 'School Supplies', 'orange')}${renderMenuBtn('wordBuilder', '📝', 'Word Builder', 'blue')}</div>`;
            }
        }

        function renderMenuBtn(game, emoji, title, color) {
            return `<button onclick="startGame('${game}')" class="w-full p-6 bg-white border-2 border-gray-100 rounded-2xl flex items-center space-x-4 btn-bounce text-left shadow-sm">
                <span class="text-4xl">${emoji}</span>
                <div class="font-bold text-xl text-gray-700 uppercase">${title}</div>
            </button>`;
        }

        function startGame(game) {
            showView('gameArea');
            const container = document.getElementById('gameAreaView');
            container.innerHTML = ""; 
            if (game === 'intro') { introState = { gender: null, step: 0 }; activeData = { boy: shuffleArray(rawIntroData.boy), girl: shuffleArray(rawIntroData.girl) }; renderIntro(); }
            else if (game === 'greetings') { greetingIdx = 0; activeData = shuffleArray(rawGreetingsData); renderGreetings(); }
            else if (game === 'playTime') { playStep = 0; activeData = shuffleArray(rawPlayTimeData); renderPlayTime(); }
            else if (game === 'quiz') { quizIdx = 0; activeData = shuffleArray(rawFeelingsData); renderQuiz(); }
            else if (game === 'colors') { colorIdx = 0; activeData = shuffleArray(rawColorsData); renderColors(); }
            else if (game === 'bodyParts') { bodyStep = 0; activeData = shuffleArray(rawBodyData); renderBody(); }
            else if (game === 'bodyMatch') { matchedCount = 0; activeData = prepareMatchData(rawBodyData); renderBodyMatch(); }
            else if (game === 'myFace') { 
                faceStep = 0; 
                currentFaceParts = shuffleArray([
                    { id: 'hair', name: 'HAIR', full: 'Where is the hair?', icon: '🦱' },
                    { id: 'ears', name: 'EARS', full: 'Where are the ears?', icon: '👂' },
                    { id: 'eyes', name: 'EYES', full: 'Where are the eyes?', icon: '👀' },
                    { id: 'nose', name: 'NOSE', full: 'Where is the nose?', icon: '👃' },
                    { id: 'tongue', name: 'TONGUE', full: 'Where is the tongue?', icon: '👅' }
                ]);
                renderFacePuzzle(); 
            }
            else if (game === 'familyMembers') { familyStep = 0; activeData = shuffleArray(rawFamilyData); renderFamilyMembers(); }
            else if (game === 'familyFlip') { memoryPageIdx = 0; renderFlipGame(); }
            else if (game === 'familyFun') { sentIdx = 0; activeData = shuffleArray(rawSentenceDataArr); renderSentences(); }
            else if (game === 'schoolSupplies') { schoolStep = 0; activeData = shuffleArray(rawSchoolData); renderSchoolSupplies(); }
            else if (game === 'wordBuilder') { builderStep = 0; activeData = shuffleArray(rawSchoolData); renderWordBuilder(); }
        }

        // --- Logic Implementation ---

        function renderIntro() {
            const container = document.getElementById('gameAreaView');
            if (introState.gender === null) {
                container.innerHTML = `<div class="text-center space-y-12 py-12 flex-grow flex flex-col justify-center animate-fade-in"><h2 class="text-3xl font-bold text-gray-700 uppercase">Are you a boy or a girl?</h2><div class="flex justify-around items-center"><button onclick="introState.gender='boy'; renderIntro();" class="flex flex-col items-center btn-bounce"><div class="text-8xl p-8 bg-blue-50 rounded-full border-4 border-blue-200">👦</div><span class="mt-4 font-bold text-blue-600 text-2xl">Boy</span></button><button onclick="introState.gender='girl'; renderIntro();" class="flex flex-col items-center btn-bounce"><div class="text-8xl p-8 bg-pink-50 rounded-full border-4 border-pink-200">👧</div><span class="mt-4 font-bold text-pink-600 text-2xl">Girl</span></button></div></div>`;
                speak("Are you a boy or a girl?");
            } else {
                const data = activeData[introState.gender][introState.step];
                container.innerHTML = `<div class="text-center space-y-6 py-4 flex flex-col h-full animate-fade-in"><div class="text-8xl p-8 bg-white rounded-full mx-auto border-2 border-orange-50">${data.img}</div><div class="p-6 bg-orange-50 rounded-[30px] mx-2 border-2 border-orange-100"><p id="introSent" class="text-2xl font-bold">${data.sentence}</p></div><div class="grid gap-4 px-4 mt-auto">${shuffleArray(data.options).map(opt => `<button onclick="checkIntro(this, '${opt}')" class="option-btn p-5 bg-white border-2 rounded-2xl font-bold uppercase text-xl">${opt}</button>`).join('')}</div></div>`;
                speak(data.correct); 
            }
        }
        function checkIntro(btn, opt) {
            const data = activeData[introState.gender][introState.step];
            if (opt.toLowerCase() === data.correct.toLowerCase()) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                speak(opt, () => { setTimeout(() => { introState.step++; if (introState.step < 3) renderIntro(); else showView('lesson1'); }, 1200); });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }

        function renderGreetings() {
            const step = rawGreetingsData[greetingIdx];
            document.getElementById('gameAreaView').innerHTML = `<div class="text-center py-10 flex flex-col h-full animate-fade-in"><div class="text-9xl mb-10">${step.icon}</div><div class="text-3xl font-bold mb-10 text-purple-700 uppercase">${step.prompt}</div><div class="flex flex-col gap-4 mt-auto">${shuffleArray([step.correct, "No, thank you"]).map(o => `<button onclick="checkGreeting(this, '${o}', '${step.correct}')" class="p-6 bg-white border-2 rounded-2xl font-bold text-xl uppercase shadow-md option-btn">${o}</button>`).join('')}</div></div>`;
            speak(step.prompt);
        }
        function checkGreeting(btn, opt, correct) {
            if (opt.toLowerCase() === correct.toLowerCase()) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                showFeedback("Great!", "bg-green-500");
                speak(correct, () => { greetingIdx++; if (greetingIdx < rawGreetingsData.length) renderGreetings(); else showView('lesson1'); });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }

        function renderPlayTime() {
            const step = activeData[playStep];
            document.getElementById('gameAreaView').innerHTML = `<div class="text-center py-10 flex flex-col h-full animate-fade-in"><div class="text-9xl mb-10">${step.icon}</div><div class="text-3xl font-bold mb-10 text-green-700 uppercase">${step.display}</div><div class="grid grid-cols-2 gap-4 mt-auto">${shuffleArray([step.correct, "ball"]).map(o => `<button onclick="checkPlay(this, '${o}', '${step.correct}')" class="p-6 bg-white border-2 rounded-2xl font-bold text-xl uppercase shadow-md option-btn">${o}</button>`).join('')}</div></div>`;
            speak(step.full); 
        }
        function checkPlay(btn, opt, correct) {
            if (opt.toLowerCase() === correct.toLowerCase()) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                speak(correct, () => { playStep++; if (playStep < activeData.length) renderPlayTime(); else showView('lesson1'); });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }

        function renderQuiz() {
            const q = activeData[quizIdx];
            document.getElementById('gameAreaView').innerHTML = `<div class="text-center py-10 flex flex-col items-center animate-fade-in"><div class="text-9xl mb-10 bg-blue-50 w-48 h-48 flex items-center justify-center rounded-full">${q.img}</div><div class="text-3xl font-bold mb-10 text-blue-700 uppercase">How do you feel?</div><div class="flex flex-col gap-4 w-full">${shuffleArray([q.correct, "Angry"]).map(o => `<button onclick="checkQuiz(this, '${o}', '${q.correct}')" class="p-6 bg-white border-2 rounded-3xl font-bold text-2xl uppercase shadow-lg option-btn">${o}</button>`).join('')}</div></div>`;
            speak("How do you feel? I feel " + q.correct);
        }
        function checkQuiz(btn, opt, correct) {
            if (opt.toLowerCase() === correct.toLowerCase()) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                speak(correct, () => { quizIdx++; if (quizIdx < activeData.length) renderQuiz(); else showView('lesson1'); });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }

        function renderColors() {
            const c = activeData[colorIdx];
            document.getElementById('gameAreaView').innerHTML = `<div class="text-center py-10 flex flex-col items-center animate-fade-in"><div class="w-48 h-48 rounded-full mb-10 border-8 border-white shadow-lg" style="background:${c.hex}"></div><div class="text-3xl font-bold mb-10 text-pink-700 uppercase">What color is this?</div><div class="flex flex-col gap-4 w-full">${shuffleArray([c.name, "Black"]).map(o => `<button onclick="checkColor(this, '${o}', '${c.name}')" class="p-6 bg-white border-2 rounded-3xl font-bold text-2xl uppercase shadow-lg option-btn">${o}</button>`).join('')}</div></div>`;
            speak("What color is this? It is " + c.name);
        }
        function checkColor(btn, opt, correct) {
            if (opt.toLowerCase() === correct.toLowerCase()) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                speak(correct, () => { colorIdx++; if (colorIdx < activeData.length) renderColors(); else showView('lesson1'); });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }

        function renderBody() {
            const step = activeData[bodyStep];
            const distractors = shuffleArray(["ear", "nose", "hand", "mouth", "toe", "eye", "head", "arms", "leg", "feet"].filter(i => i !== step.correct));
            const options = shuffleArray([step.correct, distractors[0]]);
            document.getElementById('gameAreaView').innerHTML = `<div class="text-center py-10 flex flex-col items-center h-full animate-fade-in"><div class="text-9xl mb-10 p-10 bg-blue-50 rounded-full">${step.icon}</div><div class="text-3xl font-bold mb-10 text-blue-800 uppercase">This is my...</div><div class="grid grid-cols-2 gap-4 mt-auto w-full">${options.map(o => `<button onclick="checkBody(this, '${o}', '${step.correct}')" class="p-6 bg-white border-2 rounded-2xl font-bold text-xl uppercase shadow-md option-btn">${o}</button>`).join('')}</div></div>`;
            speak("This is my " + step.correct); 
        }
        function checkBody(btn, opt, correct) {
            if (opt.toLowerCase() === correct.toLowerCase()) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                speak(correct, () => { bodyStep++; if (bodyStep < activeData.length) renderBody(); else showView('lesson2'); });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }

        // --- 核心更新：Lesson 2 Body 消消乐 (消除方块模式) ---
        function prepareMatchData(data) {
            const selection = shuffleArray(data).slice(0, 6);
            const cards = [];
            selection.forEach(item => {
                cards.push({ type: 'icon', val: item.icon, pairId: item.correct, id: Math.random() });
                cards.push({ type: 'text', val: item.correct, pairId: item.correct, id: Math.random() });
            });
            return shuffleArray(cards);
        }

        function renderBodyMatch() {
            const container = document.getElementById('gameAreaView');
            matchSelected = null;
            container.innerHTML = `
                <div class="text-center py-4 flex flex-col h-full animate-fade-in">
                    <h2 class="text-2xl font-bold text-green-700 uppercase mb-4 tracking-tight">Body Match!</h2>
                    <div class="grid grid-cols-3 gap-3" id="matchGrid">
                        ${activeData.map((card, idx) => `
                            <div id="match-card-${idx}" onclick="handleMatchClick(${idx})" class="match-tile shadow-md">
                                <span class="${card.type === 'icon' ? 'text-4xl' : 'text-sm font-bold text-blue-800 uppercase'}">${card.val}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            speak("Match the pictures with the words!");
        }

        function handleMatchClick(idx) {
            const card = activeData[idx];
            const cardEl = document.getElementById(`match-card-${idx}`);
            
            if (cardEl.classList.contains('hidden') || cardEl.classList.contains('selected')) return;

            speak(card.pairId);

            if (matchSelected === null) {
                matchSelected = idx;
                cardEl.classList.add('selected');
            } else {
                const prevIdx = matchSelected;
                const prevCard = activeData[prevIdx];
                const prevEl = document.getElementById(`match-card-${prevIdx}`);

                if (prevCard.pairId === card.pairId && prevCard.type !== card.type) {
                    // 匹配成功：直接消除
                    cardEl.classList.add('selected');
                    setTimeout(() => {
                        cardEl.classList.add('hidden');
                        prevEl.classList.add('hidden');
                        matchedCount++;
                        if (matchedCount === 6) {
                            showFeedback("Clear!", "bg-green-500");
                            speak("Great job!", () => showView('lesson2'));
                        }
                    }, 400);
                } else {
                    // 匹配失败：重置
                    cardEl.classList.add('selected');
                    setTimeout(() => {
                        cardEl.classList.remove('selected');
                        prevEl.classList.remove('selected');
                    }, 400);
                }
                matchSelected = null;
            }
        }

        // --- My Face 拼图功能 ---
        function renderFacePuzzle() {
            const container = document.getElementById('gameAreaView');
            const totalSteps = currentFaceParts.length;
            if (faceStep >= totalSteps) {
                container.innerHTML = `<div class="flex flex-col items-center py-10 animate-fade-in"><div class="relative w-64 h-64 bg-orange-100 rounded-full border-4 border-orange-200 shadow-inner mb-10"><div class="face-part visible ears-container">${renderEarsSvg()}</div><div class="face-part visible hair-svg">${renderHairSvg()}</div><div class="face-part visible eyes-container">${renderEyesSvg()}</div><div class="face-part visible nose-part text-5xl">👃</div><div class="face-part visible tongue-part text-5xl animate-pulse">👅</div></div><p class="text-3xl font-bold text-orange-600 uppercase mb-8 success-pulse">Face Done!</p><button onclick="showView('lesson2')" class="px-10 py-5 bg-orange-500 text-white rounded-full font-bold shadow-xl uppercase btn-bounce">Back</button></div>`;
                speak("Face Done! Excellent job!");
                return;
            }
            const current = currentFaceParts[faceStep];
            const options = shuffleArray([current, currentFaceParts[(faceStep+1)%totalSteps], currentFaceParts[(faceStep+2)%totalSteps]]);
            const getVisibility = (partId) => { const idx = currentFaceParts.findIndex(p => p.id === partId); return idx < faceStep ? 'visible' : ''; };
            container.innerHTML = `<div class="flex flex-col items-center py-6 h-full animate-fade-in"><div class="text-center mb-4"><p class="text-gray-400 font-bold uppercase text-xs mb-1">Step ${faceStep + 1}/${totalSteps}</p><p class="text-5xl font-black text-orange-600 tracking-widest animate-bounce uppercase">${current.name}</p></div><div class="relative w-64 h-64 bg-orange-100 rounded-full border-4 border-orange-200 shadow-inner flex items-center justify-center mb-12"><div class="face-part ${getVisibility('ears')} ears-container">${renderEarsSvg()}</div><div class="face-part ${getVisibility('hair')} hair-svg">${renderHairSvg()}</div><div class="face-part ${getVisibility('eyes')} eyes-container">${renderEyesSvg()}</div><div class="face-part ${getVisibility('nose')} nose-part text-5xl">👃</div><div class="face-part ${getVisibility('tongue')} tongue-part text-5xl">👅</div></div><div class="w-full space-y-4 mt-auto pb-10"><div class="flex justify-around items-center px-4">${options.map(opt => `<button onclick="checkFacePart(this, '${opt.id}', '${current.id}', '${current.name}')" class="p-6 bg-white border-2 border-gray-100 rounded-3xl shadow-lg btn-bounce text-6xl">${opt.icon}</button>`).join('')}</div></div></div>`;
            speak(current.full); 
        }

        function renderHairSvg() { return `<svg viewBox="0 0 100 50" class="w-full h-full"><path d="M5,45 Q5,5 50,5 Q95,5 95,45 L95,45 Q80,35 65,45 Q50,30 35,45 Q20,35 5,45 Z" fill="#2d241e"/></svg>`; }
        function renderEyesSvg() { return `<div class="flex w-full justify-around"><svg class="w-10 h-10" viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="white" stroke="#333" stroke-width="2"/><circle cx="20" cy="20" r="8" fill="#111"/></svg><svg class="w-10 h-10" viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill="white" stroke="#333" stroke-width="2"/><circle cx="20" cy="20" r="8" fill="#111"/></svg></div>`; }
        function renderEarsSvg() { return `<div class="flex w-full justify-between"><svg class="w-10 h-14" viewBox="0 0 20 30"><path d="M20,5 Q5,5 5,15 Q5,25 20,25" fill="none" stroke="#edc9af" stroke-width="5" stroke-linecap="round"/></svg><svg class="w-10 h-14" viewBox="0 0 20 30" style="transform: scaleX(-1);"><path d="M20,5 Q5,5 5,15 Q5,25 20,25" fill="none" stroke="#edc9af" stroke-width="5" stroke-linecap="round"/></svg></div>`; }

        function checkFacePart(btn, selectedId, correctId, name) {
            if (selectedId === correctId) { btn.classList.add('bg-green-100', 'border-green-500'); showFeedback("Great!", "bg-green-500"); speak(name.toLowerCase(), () => { faceStep++; setTimeout(renderFacePuzzle, 1000); }); }
            else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }

        function renderFamilyMembers() {
            const item = activeData[familyStep]; const other = rawFamilyData.filter(i => i.name !== item.name); const wrong = other[Math.floor(Math.random() * other.length)].name;
            document.getElementById('gameAreaView').innerHTML = `<div class="text-center py-10 flex flex-col items-center h-full animate-fade-in"><p class="text-gray-400 font-bold uppercase text-xs mb-4">Member ${familyStep + 1}/${activeData.length}</p><div class="text-9xl mb-10 p-10 bg-pink-50 rounded-full shadow-lg border-4 border-pink-100">${item.icon}</div><div class="grid grid-cols-1 gap-4 mt-auto w-full">${shuffleArray([item.name, wrong]).map(opt => `<button onclick="checkFamilyMember(this, '${opt}', '${item.name}')" class="p-6 bg-white border-2 rounded-2xl font-bold text-2xl uppercase shadow-md option-btn">${opt}</button>`).join('')}</div></div>`;
            speak("Who is this?"); 
        }
        function checkFamilyMember(btn, opt, correct) { if (opt.toLowerCase() === correct.toLowerCase()) { btn.classList.add('bg-green-500', 'text-white', 'border-green-600'); showFeedback("Correct!", "bg-green-500"); speak(correct, () => { familyStep++; if (familyStep < activeData.length) renderFamilyMembers(); else showView('lesson3'); }); } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); } }

        function renderFlipGame() { matchedCount = 0; flippedIndices = []; const itemsPerPage = 3; const start = memoryPageIdx * itemsPerPage; let pageItems = rawFamilyData.slice(start, start + itemsPerPage); if (pageItems.length > 0 && pageItems.length < itemsPerPage) { const pool = rawFamilyData.filter(item => !pageItems.includes(item)); pageItems = [...pageItems, ...shuffleArray(pool).slice(0, itemsPerPage - pageItems.length)]; } const cards = []; pageItems.forEach(item => { cards.push({ type: 'icon', val: item.icon, name: item.name }, { type: 'name', val: item.name, name: item.name }); }); flipCards = shuffleArray(cards); document.getElementById('gameAreaView').innerHTML = `<div class="text-center py-2 flex flex-col h-full animate-fade-in"><p class="text-gray-400 font-bold uppercase text-xs mb-4">Page ${memoryPageIdx + 1}/3</p><div class="memory-grid" id="memoryGrid">${flipCards.map((card, i) => `<div class="card" id="card-${i}" onclick="handleFlip(${i})"><div class="card-face card-front">❓</div><div class="card-face card-back"><div class="${card.type === 'icon' ? 'text-6xl' : 'text-lg font-bold text-orange-800 uppercase'}">${card.val}</div></div></div>`).join('')}</div></div>`; speak("Match the cards!"); }
        function handleFlip(idx) { const cardEl = document.getElementById(`card-${idx}`); if (cardEl.classList.contains('flipped') || cardEl.classList.contains('matched') || flippedIndices.length === 2) return; cardEl.classList.add('flipped'); flippedIndices.push(idx); speak(flipCards[idx].name); if (flippedIndices.length === 2) { const [i1, i2] = flippedIndices; if (flipCards[i1].name === flipCards[i2].name) { setTimeout(() => { document.getElementById(`card-${i1}`).classList.add('matched'); document.getElementById(`card-${i2}`).classList.add('matched'); matchedCount++; flippedIndices = []; if (matchedCount === 3) { setTimeout(() => { memoryPageIdx++; if (memoryPageIdx < 3) renderFlipGame(); else showView('lesson3'); }, 1200); } }, 600); } else { setTimeout(() => { document.getElementById(`card-${i1}`).classList.remove('flipped'); document.getElementById(`card-${i2}`).classList.remove('flipped'); flippedIndices = []; }, 1000); } } }

        function renderSentences() { 
            const data = activeData[sentIdx]; buildWords = []; const shuffled = shuffleArray([...data.words]); 
            const colors = ['bg-red-100', 'bg-blue-100', 'bg-green-100', 'bg-yellow-100', 'bg-purple-100', 'bg-pink-100']; 
            document.getElementById('gameAreaView').innerHTML = `<div class="text-center space-y-4 py-2 flex flex-col h-full animate-fade-in"><p class="text-gray-400 font-bold uppercase text-xs">Sentence ${sentIdx + 1}/6</p><div class="text-9xl p-4 bg-white rounded-3xl shadow-md border-2 border-green-50 mx-auto">${data.photo}</div><div class="p-6 bg-green-50 rounded-[30px] border-2 border-green-100 min-h-[140px] flex flex-wrap items-center justify-center gap-3" id="sentOutput"><span class="text-gray-300 italic">Tap words below to build...</span></div><div class="flex flex-wrap justify-center gap-3 mt-4" id="wordBank">${shuffled.map((w, i) => `<button onclick="addWordToSent(this, '${w.replace(/'/g, "\\'")}')" class="word-chip ${colors[i % colors.length]}">${w}</button>`).join('')}</div></div>`; 
            speak(data.full); 
        }
        function addWordToSent(btn, word) { btn.classList.add('used'); buildWords.push(word); refreshSentenceOutput(); speak(word); checkSentenceComplete(); }
        function removeWordFromSent(wordIdx) { const wordToRemove = buildWords[wordIdx]; buildWords.splice(wordIdx, 1); const bankButtons = document.querySelectorAll('#wordBank button'); for (let btn of bankButtons) { if (btn.innerText === wordToRemove && btn.classList.contains('used')) { btn.classList.remove('used'); break; } } refreshSentenceOutput(); speak("removed"); }
        function refreshSentenceOutput() { const output = document.getElementById('sentOutput'); if (buildWords.length === 0) { output.innerHTML = `<span class="text-gray-300 italic">Tap words below to build...</span>`; return; } output.innerHTML = buildWords.map((w, idx) => `<button onclick="removeWordFromSent(${idx})" class="text-2xl font-bold text-green-800 px-4 py-2 bg-white rounded-xl border-2 border-green-200 animate-fade-in shadow-sm m-1 transition-transform active:scale-95">${w}</button>`).join(''); }
        function checkSentenceComplete() { const data = activeData[sentIdx]; if (buildWords.length === data.words.length) { if (buildWords.join(' ') === data.words.join(' ')) { const output = document.getElementById('sentOutput'); output.classList.add('success-pulse', 'bg-green-100'); showFeedback("Perfect!", "bg-green-500"); speak(data.full, () => { setTimeout(() => { sentIdx++; if (sentIdx < activeData.length) renderSentences(); else showView('lesson3'); }, 1800); }); } else { showFeedback("Check the order!", "bg-red-400"); speak("Try again"); } } }

        function renderSchoolSupplies() {
            const item = activeData[schoolStep]; const distractors = shuffleArray(rawSchoolData.filter(i => i.name !== item.name)); const options = shuffleArray([item.name, distractors[0].name]);
            document.getElementById('gameAreaView').innerHTML = `<div class="text-center py-10 flex flex-col items-center h-full animate-fade-in"><p class="text-gray-400 font-bold uppercase text-xs mb-4">Item ${schoolStep + 1}/${activeData.length}</p><div class="text-9xl mb-10 p-10 bg-orange-50 rounded-full border-4 border-orange-100 shadow-lg">${item.icon}</div><div class="text-3xl font-bold mb-8 text-orange-700 uppercase">What is this?</div><div class="grid grid-cols-2 gap-4 mt-auto w-full">${options.map(opt => `<button onclick="checkSchoolItem(this, '${opt}', '${item.name}')" class="p-6 bg-white border-2 rounded-2xl font-bold text-xl uppercase shadow-md option-btn">${opt}</button>`).join('')}</div></div>`;
            speak("What is this? It is a " + item.name);
        }
        function checkSchoolItem(btn, opt, correct) { if (opt.toLowerCase() === correct.toLowerCase()) { btn.classList.add('bg-green-500', 'text-white', 'border-green-600'); speak(correct, () => { schoolStep++; if (schoolStep < activeData.length) renderSchoolSupplies(); else showView('lesson4'); }); } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); } }

        // --- Word Builder：核心拼写游戏渲染 (小写显示、自动缩放、空格处理) ---
        function renderWordBuilder() {
            const item = activeData[builderStep];
            buildLetters = [];
            const targetWord = item.name;
            const lettersPool = shuffleArray(targetWord.replace(/\s/g, '').split(''));
            const colors = ['bg-red-100', 'bg-blue-100', 'bg-green-100', 'bg-yellow-100', 'bg-purple-100', 'bg-pink-100', 'bg-orange-100'];
            const themeColor = 'blue';

            document.getElementById('gameAreaView').innerHTML = `
                <div class="text-center space-y-4 py-4 flex flex-col h-full animate-fade-in">
                    <p class="text-gray-400 font-bold uppercase text-xs">Word ${builderStep + 1}/${activeData.length}</p>
                    <div class="text-9xl p-4 bg-white rounded-3xl shadow-md border-2 border-${themeColor}-50 mx-auto">${item.icon}</div>
                    <div id="letterOutput" class="p-4 bg-${themeColor}-50 rounded-[30px] border-2 border-${themeColor}-100 min-h-[110px] flex flex-nowrap items-center justify-center overflow-x-hidden whitespace-nowrap">
                        <span class="text-gray-300 italic">Tap letters below...</span>
                    </div>
                    <div class="flex flex-wrap justify-center gap-2 mt-4" id="letterBank">
                        ${lettersPool.map((l, i) => `<button onclick="addLetterToWord(this, '${l}')" class="letter-chip ${colors[i % colors.length]}">${l}</button>`).join('')}
                    </div>
                </div>`;
            speak(targetWord);
        }

        function addLetterToWord(btn, char) { btn.classList.add('used'); buildLetters.push(char); refreshLetterOutput(); speak(char); checkWordComplete(); }
        function removeLetterFromWord(idx) {
            const charToRemove = buildLetters[idx]; buildLetters.splice(idx, 1);
            const bankButtons = document.querySelectorAll('#letterBank button');
            for (let btn of bankButtons) { if (btn.innerText === charToRemove && btn.classList.contains('used')) { btn.classList.remove('used'); break; } }
            refreshLetterOutput(); speak("removed");
        }

        function refreshLetterOutput() {
            const output = document.getElementById('letterOutput'); const item = activeData[builderStep]; const targetWord = item.name;
            if (buildLetters.length === 0) { output.innerHTML = `<span class="text-gray-300 italic">Tap letters below...</span>`; return; }
            let fontSize = "text-3xl";
            if (targetWord.length > 10) fontSize = "text-lg"; else if (targetWord.length > 8) fontSize = "text-xl"; else if (targetWord.length > 6) fontSize = "text-2xl";
            let html = ""; let currentLetterIdx = 0; const originalChars = targetWord.split(''); const themeColor = 'blue';
            originalChars.forEach((char) => {
                if (char === ' ') { html += `<div class="w-6"></div>`; } 
                else {
                    if (currentLetterIdx < buildLetters.length) {
                        const l = buildLetters[currentLetterIdx];
                        html += `<button onclick="removeLetterFromWord(${currentLetterIdx})" class="${fontSize} font-black text-${themeColor}-800 px-3 py-1 bg-white rounded-xl border-2 border-${themeColor}-200 animate-fade-in shadow-sm mx-0.5 transition-transform active:scale-95 lowercase">${l}</button>`;
                        currentLetterIdx++;
                    } else { html += `<div class="w-6 h-10 border-b-4 border-${themeColor}-200 mx-1"></div>`; }
                }
            });
            output.innerHTML = html;
        }

        function checkWordComplete() {
            const item = activeData[builderStep]; const targetWord = item.name; const targetNoSpace = targetWord.replace(/\s/g, ''); 
            if (buildLetters.length === targetNoSpace.length) {
                if (buildLetters.join('') === targetNoSpace) {
                    const output = document.getElementById('letterOutput'); output.classList.add('success-pulse', 'bg-green-100'); showFeedback("Awesome!", "bg-green-500");
                    speak(targetWord, () => { setTimeout(() => { builderStep++; if (builderStep < activeData.length) renderWordBuilder(); else showView('lesson4'); }, 1800); });
                } else { showFeedback("Check spelling!", "bg-red-400"); speak("Try again"); }
            }
        }

        showView('lessonMenu');
    </script>
</body>
</html>
