<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lesson 1: Back to School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fffaf5;
            user-select: none;
            overflow-x: hidden;
            touch-action: manipulation;
            color: #4a4a4a;
        }

        .btn-bounce:active {
            transform: scale(0.92);
        }

        .option-btn {
            transition: all 0.2s;
            box-shadow: 0 6px 0 #e5e5e5;
            -webkit-tap-highlight-color: transparent;
        }

        .option-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #e5e5e5;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .highlight-text {
            color: #f97316;
            font-weight: 700;
            border-bottom: 4px solid #ffedd5;
            padding: 0 4px;
        }

        .success-pulse {
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }

        #audioUnlocker {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .color-ball {
            box-shadow: inset -15px -15px 30px rgba(0,0,0,0.15), 0 15px 25px rgba(0,0,0,0.1);
            border: 8px solid white;
        }
        
        .color-ball-white {
            border: 8px solid #e5e5e5 !important;
        }

        .bubble-left {
            background-color: #f3f4f6;
            border-radius: 20px 20px 20px 0;
        }
        .bubble-right {
            background-color: #dcfce7;
            border-radius: 20px 20px 0 20px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- 背景音乐音频 -->
    <audio id="bgm" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <!-- Audio Unlock Overlay -->
    <div id="audioUnlocker">
        <div class="text-8xl mb-6">🎒</div>
        <h1 class="text-3xl font-bold text-orange-600 mb-2 uppercase">Back to School</h1>
        <p class="text-gray-500 mb-8">Lesson 1: Let's Learn!</p>
        <button onclick="unlockAudio()" class="px-12 py-5 bg-orange-500 text-white rounded-full font-bold text-2xl shadow-xl btn-bounce uppercase tracking-wide">
            Start!
        </button>
    </div>

    <div id="app" class="max-w-md mx-auto w-full flex-grow flex flex-col shadow-2xl bg-white min-h-screen relative">
        
        <!-- Header -->
        <header class="p-4 flex items-center justify-between bg-orange-50 border-b-2 border-orange-100">
            <button id="homeBtn" class="text-orange-500 font-bold p-2 hidden">🏠 Home</button>
            <h1 class="text-xl font-bold text-orange-600 flex-grow text-center uppercase tracking-tight">Lesson 1</h1>
            <div class="w-10"></div>
        </header>

        <main id="mainContent" class="flex-grow p-6 flex flex-col">
            
            <!-- Menu View -->
            <div id="menuView" class="w-full space-y-3 fade-in text-center">
                <div class="py-2">
                    <div class="text-6xl mb-2">🏫</div>
                    <h2 class="text-2xl font-bold text-gray-800 uppercase tracking-wide">Hello Friends!</h2>
                </div>

                <div class="grid gap-3">
                    <button onclick="showView('intro')" class="w-full p-4 bg-yellow-50 rounded-2xl border-2 border-yellow-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">👋</span>
                        <div>
                            <div class="font-bold text-base text-yellow-700 uppercase leading-none">Self Intro</div>
                            <div class="text-xs text-yellow-600">I am Eden / Effie</div>
                        </div>
                    </button>

                    <button onclick="showView('greetings')" class="w-full p-4 bg-purple-50 rounded-2xl border-2 border-purple-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">💬</span>
                        <div>
                            <div class="font-bold text-base text-purple-700 uppercase leading-none">Greetings</div>
                            <div class="text-xs text-purple-600">Dialogue Practice</div>
                        </div>
                    </button>

                    <button onclick="showView('playTime')" class="w-full p-4 bg-green-50 rounded-2xl border-2 border-green-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">🧸</span>
                        <div>
                            <div class="font-bold text-base text-green-700 uppercase leading-none">Play Time</div>
                            <div class="text-xs text-green-600">I am / I like to play</div>
                        </div>
                    </button>

                    <button onclick="showView('quiz')" class="w-full p-4 bg-blue-50 rounded-2xl border-2 border-blue-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">😊</span>
                        <div>
                            <div class="font-bold text-base text-blue-700 uppercase leading-none">Feelings</div>
                            <div class="text-xs text-blue-600">Fine, Happy, Sad...</div>
                        </div>
                    </button>

                    <button onclick="showView('colors')" class="w-full p-4 bg-pink-50 rounded-2xl border-2 border-pink-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-4xl">🌈</span>
                        <div>
                            <div class="font-bold text-base text-pink-700 uppercase leading-none">Color Fun</div>
                            <div class="text-xs text-pink-600">All the Colors</div>
                        </div>
                    </button>
                </div>
            </div>

            <!-- Views Containers -->
            <div id="introView" class="hidden flex-grow flex flex-col"><div id="introGameContent" class="fade-in flex-grow flex flex-col"></div></div>
            <div id="greetingsView" class="hidden flex-grow flex flex-col fade-in"><div id="greetingsContainer" class="flex-grow flex flex-col space-y-6 py-4"></div></div>
            <div id="playTimeView" class="hidden flex-grow flex flex-col fade-in"><div id="playTimeContainer" class="flex-grow flex flex-col space-y-6 py-4"></div></div>
            <div id="quizView" class="hidden w-full text-center fade-in"><div id="quizContainer" class="space-y-6 flex flex-col items-center"></div></div>
            <div id="colorsView" class="hidden w-full text-center fade-in"><div id="colorsContainer" class="space-y-6 flex flex-col items-center"></div></div>

        </main>
    </div>

    <!-- Feedback UI -->
    <div id="feedback" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 px-10 py-5 rounded-3xl text-white font-bold text-3xl opacity-0 transition-opacity z-[999] pointer-events-none shadow-2xl"></div>

    <script>
        const views = ['menu', 'intro', 'quiz', 'colors', 'greetings', 'playTime'];
        let introState = { gender: null, step: 0 };
        let isAudioUnlocked = false;
        let bgmAudio = document.getElementById('bgm');

        // --- Helper: Shuffle Array ---
        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function unlockAudio() {
            isAudioUnlocked = true;
            document.getElementById('audioUnlocker').style.display = 'none';
            playBGM();
            speak("Welcome! Let's play.");
        }

        function playBGM() {
            if (isAudioUnlocked) {
                bgmAudio.volume = 0.2; 
                bgmAudio.play().catch(e => console.log("BGM playback blocked"));
            }
        }

        function stopBGM() {
            bgmAudio.pause();
        }

        function speak(text, callback) {
            if (!isAudioUnlocked) return;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance();
                msg.text = text;
                msg.lang = 'en-GB'; 
                msg.rate = 0.7; 
                msg.pitch = 1.1; 
                const voices = window.speechSynthesis.getVoices();
                const femaleVoice = voices.find(v => (v.name.includes('Female') || v.name.includes('UK English') || v.name.includes('Samantha')) && v.lang.startsWith('en'));
                if (femaleVoice) msg.voice = femaleVoice;
                let done = false;
                msg.onend = () => { if(!done){ done=true; if(callback) callback(); }};
                msg.onerror = () => { if(!done){ done=true; if(callback) callback(); }};
                setTimeout(() => { if(!done){ done=true; if(callback) callback(); }}, 5000); 
                window.speechSynthesis.speak(msg);
            } else if (callback) callback();
        }

        function showView(viewName) {
            views.forEach(v => document.getElementById(v + 'View').classList.add('hidden'));
            document.getElementById(viewName + 'View').classList.remove('hidden');
            document.getElementById('homeBtn').classList.toggle('hidden', viewName === 'menu');
            
            if (viewName === 'menu') {
                playBGM();
            } else {
                stopBGM();
            }

            if(viewName === 'intro') startIntroGame();
            if(viewName === 'quiz') startQuiz();
            if(viewName === 'colors') startColorsGame();
            if(viewName === 'greetings') startGreetingsGame();
            if(viewName === 'playTime') startPlayTimeGame();
        }

        document.getElementById('homeBtn').onclick = () => {
            window.speechSynthesis.cancel();
            showView('menu');
        };

        // --- Greetings Dialogue Logic ---
        let greetingIdx = 0;
        const greetingData = [
            { icon: '☀️', prompt: "Good morning!", options: ["Good morning", "Good afternoon"], correct: "Good morning" },
            { icon: '🌤️', prompt: "Good afternoon!", options: ["Good afternoon", "Good evening"], correct: "Good afternoon" },
            { icon: '🌙', prompt: "Good night!", options: ["Good morning", "Good night"], correct: "Good night" },
            { icon: '⚽', prompt: "Can I play with u?", options: ["Yes, you can", "Good morning"], correct: "Yes, you can" },
            { icon: '🧸', prompt: "Do you want to play with me?", options: ["Yes, i do", "Good night"], correct: "Yes, i do" }
        ];

        function startGreetingsGame() {
            greetingIdx = 0;
            renderGreetingStep();
        }

        function renderGreetingStep() {
            const container = document.getElementById('greetingsContainer');
            const data = greetingData[greetingIdx];
            const shuffledOptions = shuffleArray(data.options);

            container.innerHTML = `
                <div class="flex flex-col h-full">
                    <p class="text-center text-gray-400 font-bold uppercase text-xs mb-2">Step ${greetingIdx + 1}/5</p>
                    <div class="flex items-start space-x-3 mb-8 animate-fade-in">
                        <div class="text-4xl p-2 bg-orange-100 rounded-full">👩‍🏫</div>
                        <div class="bubble-left p-4 text-xl font-bold shadow-sm">${data.prompt} ${data.icon}</div>
                    </div>
                    <div id="userReplyArea" class="flex items-end justify-end space-x-3 mb-auto opacity-40">
                        <div class="bubble-right p-4 text-xl font-bold shadow-sm"><span id="replyText">......</span></div>
                        <div class="text-4xl p-2 bg-green-100 rounded-full">👦</div>
                    </div>
                    <div class="grid grid-cols-1 gap-4 mt-auto pb-10">
                        ${shuffledOptions.map(opt => `<button onclick="checkGreetingAnswer(this, '${opt}')" class="greeting-option p-5 text-xl font-bold rounded-2xl bg-white border-2 border-purple-100 text-purple-600 option-btn uppercase">${opt}</button>`).join('')}
                    </div>
                </div>
            `;
            speak(data.prompt);
        }

        function checkGreetingAnswer(btn, selected) {
            const data = greetingData[greetingIdx];
            const allBtns = document.querySelectorAll('.greeting-option');
            allBtns.forEach(b => b.disabled = true);
            if (selected.toLowerCase() === data.correct.toLowerCase()) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                document.getElementById('userReplyArea').classList.remove('opacity-40');
                document.getElementById('replyText').innerText = data.correct + "!";
                showFeedback("Well said!", "bg-green-500");
                speak(data.correct, () => {
                    setTimeout(() => {
                        greetingIdx++;
                        if (greetingIdx < greetingData.length) renderGreetingStep();
                        else finishGreetings();
                    }, 1500);
                });
            } else {
                showFeedback("Try again!", "bg-red-400"); speak("Try again", () => allBtns.forEach(b => b.disabled = false));
            }
        }

        function finishGreetings() {
            document.getElementById('greetingsContainer').innerHTML = `<div class="flex flex-col items-center justify-center py-20 animate-fade-in"><div class="text-9xl mb-6">💬</div><h3 class="text-4xl font-bold text-purple-600 uppercase">Super Chat!</h3><button onclick="startGreetingsGame()" class="mt-10 px-14 py-6 bg-purple-500 text-white rounded-full font-bold text-2xl shadow-xl btn-bounce uppercase">Play Again</button></div>`;
            speak("Super Chat! Great job!");
        }

        // --- Play Time Logic ---
        let playStep = 0;
        const playData = [
            { icon: '🧱', sentence: "I am playing with <span class='highlight-text'>______</span>.", full: "I am playing with blocks.", options: ['blocks', 'puzzles'], correct: 'blocks' },
            { icon: '🧩', sentence: "I am playing with <span class='highlight-text'>______</span>.", full: "I am playing with puzzles.", options: ['puzzles', 'sand'], correct: 'puzzles' },
            { icon: '🛝', sentence: "I am playing on the <span class='highlight-text'>______</span>.", full: "I am playing on the slide.", options: ['slide', 'swing'], correct: 'slide' },
            { icon: '🏖️', sentence: "I am playing with <span class='highlight-text'>______</span>.", full: "I am playing with sand.", options: ['sand', 'blocks'], correct: 'sand' },
            { icon: '🪑', sentence: "I like to play with <span class='highlight-text'>______</span>.", full: "I like to play with swing.", options: ['swing', 'puzzles'], correct: 'swing' },
            { icon: '🧱', sentence: "I like to play with <span class='highlight-text'>______</span>.", full: "I like to play with blocks.", options: ['blocks', 'swing'], correct: 'blocks' },
            { icon: '🧩', sentence: "I like to play with <span class='highlight-text'>______</span>.", full: "I like to play with puzzles.", options: ['puzzles', 'slide'], correct: 'puzzles' },
            { icon: '🏖️', sentence: "I like to play with <span class='highlight-text'>______</span>.", full: "I like to play with sand.", options: ['sand', 'blocks'], correct: 'sand' },
            { icon: '🛝', sentence: "I like to play with <span class='highlight-text'>______</span>.", full: "I like to play with slide.", options: ['slide', 'swing'], correct: 'slide' }
        ];
        function startPlayTimeGame() { playStep = 0; renderPlayStep(); }
        function renderPlayStep() {
            const container = document.getElementById('playTimeContainer');
            const data = playData[playStep];
            const shuffledOptions = shuffleArray(data.options);

            container.innerHTML = `<div class="text-center space-y-6 py-4 flex flex-col h-full animate-fade-in"><p class="text-gray-400 font-bold uppercase text-xs">Step ${playStep + 1}/9</p><div class="flex justify-center mt-2"><div class="text-8xl p-8 bg-white rounded-full shadow-lg border-2 border-green-50">${data.icon}</div></div><div class="p-6 bg-green-50 rounded-[30px] mx-2 border-2 border-green-100" id="playTextContainer"><p id="playSentence" class="text-2xl font-bold leading-relaxed">${data.sentence}</p></div><div class="grid grid-cols-2 gap-4 px-4 pb-8 mt-auto">${shuffledOptions.map(opt => `<button onclick="checkPlayAnswer(this, '${opt}')" class="play-option-btn p-5 text-xl font-bold rounded-2xl bg-white border-2 border-gray-100 uppercase option-btn">${opt}</button>`).join('')}</div></div>`;
            speak(data.full);
        }
        function checkPlayAnswer(btn, selected) {
            const data = playData[playStep];
            const allBtns = document.querySelectorAll('.play-option-btn');
            allBtns.forEach(b => b.disabled = true);
            if (selected === data.correct) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                document.getElementById('playSentence').innerHTML = data.full;
                document.getElementById('playTextContainer').classList.add('success-pulse');
                showFeedback("Correct!", "bg-green-500");
                speak(data.full, () => { setTimeout(() => { playStep++; if (playStep < playData.length) renderPlayStep(); else finishPlayTime(); }, 1000); });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again", () => allBtns.forEach(b => b.disabled = false)); }
        }
        function finishPlayTime() { document.getElementById('playTimeContainer').innerHTML = `<div class="text-center py-20 flex-grow flex flex-col justify-center animate-fade-in"><div class="text-9xl mb-6">🏆</div><h2 class="text-4xl font-bold text-green-600 uppercase">Fantastic!</h2><button onclick="startPlayTimeGame()" class="mx-auto mt-8 px-14 py-6 bg-green-500 text-white rounded-full font-bold text-2xl shadow-xl btn-bounce uppercase">Play Again</button></div>`; speak("Fantastic job!"); }

        // --- Intro Logic ---
        const introData = {
            boy: [{ img: '👦', sentence: "My name is <span class='highlight-text'>______</span>.", full: "My name is Eden.", options: ['Effie', 'Eden', 'Janice'], correct: 'Eden' }, { img: '5️⃣', sentence: "I am <span class='highlight-text'>___</span> years old.", full: "I am five years old.", options: ['four', 'five', 'six'], correct: 'five' }, { img: '👦', sentence: "I am a <span class='highlight-text'>____</span>.", full: "I am a boy.", options: ['boy', 'girl'], correct: 'boy' }],
            girl: [{ img: '👧', sentence: "My name is <span class='highlight-text'>______</span>.", full: "My name is Effie.", options: ['Effie', 'Eden', 'Janice'], correct: 'Effie' }, { img: '3️⃣', sentence: "I am <span class='highlight-text'>___</span> years old.", full: "I am three years old.", options: ['two', 'three', 'four'], correct: 'three' }, { img: '👧', sentence: "I am a <span class='highlight-text'>____</span>.", full: "I am a girl.", options: ['boy', 'girl'], correct: 'girl' }]
        };
        function startIntroGame() { introState.gender = null; introState.step = 0; renderIntroStep(); }
        function renderIntroStep() {
            const container = document.getElementById('introGameContent');
            if (introState.gender === null) {
                container.innerHTML = `<div class="text-center space-y-12 py-12 flex-grow flex flex-col justify-center"><h2 class="text-3xl font-bold text-gray-700 uppercase">Are you a boy or a girl?</h2><div class="flex justify-around items-center"><button onclick="selectGender('boy')" class="flex flex-col items-center btn-bounce"><div class="text-8xl p-8 bg-blue-50 rounded-full border-4 border-blue-200">👦</div><span class="mt-4 font-bold text-blue-600 text-2xl">Boy</span></button><button onclick="selectGender('girl')" class="flex flex-col items-center btn-bounce"><div class="text-8xl p-8 bg-pink-50 rounded-full border-4 border-pink-200">👧</div><span class="mt-4 font-bold text-pink-600 text-2xl">Girl</span></button></div></div>`;
                speak("Are you a boy or a girl?"); return;
            }
            const currentData = introData[introState.gender][introState.step];
            const shuffledOptions = shuffleArray(currentData.options);

            container.innerHTML = `<div class="text-center space-y-6 py-4 flex flex-col h-full animate-fade-in"><div class="flex justify-center mt-2"><div class="text-8xl p-8 bg-white rounded-full shadow-lg border-2 border-orange-50">${currentData.img}</div></div><div class="p-6 bg-orange-50 rounded-[30px] mx-2 border-2 border-orange-100" id="textContainer"><p id="sentenceDisplay" class="text-2xl leading-relaxed font-bold">${currentData.sentence}</p></div><div class="grid grid-cols-1 gap-4 px-4 pb-8 mt-auto">${shuffledOptions.map(opt => `<button onclick="checkIntroAnswer(this, '${opt}')" class="option-btn p-4 text-xl font-bold rounded-2xl bg-white border-2 border-gray-100 uppercase">${opt}</button>`).join('')}</div></div>`;
            speak(currentData.full);
        }
        function selectGender(g) { introState.gender = g; speak("I am a " + g, () => renderIntroStep()); }
        function checkIntroAnswer(btn, selected) {
            const currentData = introData[introState.gender][introState.step];
            if (selected === currentData.correct) {
                const allBtns = document.querySelectorAll('.option-btn'); allBtns.forEach(b => b.disabled = true);
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                document.getElementById('sentenceDisplay').innerHTML = currentData.full;
                document.getElementById('textContainer').classList.add('success-pulse');
                showFeedback("Great!", "bg-green-500");
                speak(currentData.full, () => { setTimeout(() => { introState.step++; if (introState.step < 3) renderIntroStep(); else showIntroFinish(); }, 800); });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }
        function showIntroFinish() { const container = document.getElementById('introGameContent'); container.innerHTML = `<div class="text-center py-20 flex-grow flex flex-col justify-center animate-fade-in"><div class="text-9xl">🥳</div><h2 class="text-4xl font-bold text-orange-600 uppercase">Excellent!</h2><button onclick="startIntroGame()" class="mx-auto mt-8 px-14 py-6 bg-orange-500 text-white rounded-full font-bold text-2xl shadow-2xl btn-bounce uppercase">Play Again</button></div>`; speak("Well done!"); }

        // --- Feelings Logic ---
        let quizIdx = 0;
        const quizQuestions = [{ img: '😊', q: 'How do you feel?', options: ['Happy', 'Sad'], correct: 'Happy' }, { img: '👌', q: 'How do you feel?', options: ['Fine', 'Sad'], correct: 'Fine' }, { img: '😢', q: 'How do you feel?', options: ['Happy', 'Sad'], correct: 'Sad' }, { img: '😰', q: 'How do you feel?', options: ['Nervous', 'Fine'], correct: 'Nervous' }];
        function startQuiz() { quizIdx = 0; renderQuizQ(); }
        function renderQuizQ() { 
            const container = document.getElementById('quizContainer'); 
            const q = quizQuestions[quizIdx]; 
            const shuffledOptions = shuffleArray(q.options);

            container.innerHTML = `<div class="w-full animate-fade-in"><div class="text-9xl mb-8 bg-yellow-50 w-44 h-44 flex items-center justify-center rounded-full mx-auto shadow-inner">${q.img}</div><h3 class="text-3xl font-bold mb-8 text-gray-700 uppercase">How do you feel?</h3><div class="grid grid-cols-1 gap-4 w-full px-4">${shuffledOptions.map(opt => `<button onclick="checkQuizAnswer(this, '${opt}', '${q.correct}')" class="quiz-btn option-btn p-5 text-2xl font-bold rounded-[30px] bg-white border-2 border-blue-100 text-blue-600 uppercase">${opt}</button>`).join('')}</div></div>`; speak("How do you feel?"); 
        }
        function checkQuizAnswer(btn, selected, correct) { const allBtns = document.querySelectorAll('.quiz-btn'); allBtns.forEach(b => b.disabled = true); if (selected === correct) { btn.classList.add('bg-green-500', 'text-white', 'border-green-600'); showFeedback("Correct!", "bg-green-500"); const speakSentence = selected === "Fine" ? "I am fine, thank you" : "I feel " + selected; speak(speakSentence, () => { setTimeout(() => { quizIdx++; if (quizIdx < quizQuestions.length) renderQuizQ(); else finishQuiz(); }, 1000); }); } else { showFeedback("Try again!", "bg-red-400"); speak(selected + ". Try again", () => allBtns.forEach(b => b.disabled = false)); } }
        function finishQuiz() { document.getElementById('quizContainer').innerHTML = `<div class="py-20 animate-fade-in"><div class="text-9xl mb-6">⭐</div><h3 class="text-4xl font-bold text-blue-600 uppercase">Great Job!</h3><button onclick="startQuiz()" class="mt-10 px-12 py-5 bg-blue-500 text-white rounded-full font-bold text-xl shadow-lg btn-bounce uppercase">Play Again</button></div>`; speak("Great job!"); }

        // --- Colors Logic ---
        let colorIdx = 0;
        const colorQuestions = [{ hex: '#FF0000', name: 'Red', options: ['Red', 'Green'] }, { hex: '#FFA500', name: 'Orange', options: ['Orange', 'Pink'] }, { hex: '#FFFF00', name: 'Yellow', options: ['Yellow', 'Violet'] }, { hex: '#008000', name: 'Green', options: ['Green', 'Blue'] }, { hex: '#0000FF', name: 'Blue', options: ['Indigo', 'Blue'] }, { hex: '#4B0082', name: 'Indigo', options: ['Indigo', 'Black'] }, { hex: '#EE82EE', name: 'Violet', options: ['Violet', 'Grey'] }, { hex: '#000000', name: 'Black', options: ['Black', 'Blue'] }, { hex: '#FFFFFF', name: 'White', options: ['White', 'Grey'], isWhite: true }, { hex: '#808080', name: 'Grey', options: ['Black', 'Grey'] }];
        function startColorsGame() { colorIdx = 0; renderColorQ(); }
        function renderColorQ() { 
            const container = document.getElementById('colorsContainer'); 
            const c = colorQuestions[colorIdx]; 
            const shuffledOptions = shuffleArray(c.options);

            container.innerHTML = `<div class="w-full animate-fade-in"><p class="text-gray-400 mb-2 font-bold uppercase text-sm">Color ${colorIdx+1}/10</p><div onclick="speak('${c.name}')" class="color-ball ${c.isWhite ? 'color-ball-white' : ''} w-48 h-48 rounded-full mx-auto mb-10 cursor-pointer transition-transform hover:scale-105 active:scale-95 shadow-lg" style="background-color: ${c.hex}"></div><h3 class="text-3xl font-bold mb-8 text-gray-700 uppercase">What color is this?</h3><div class="grid grid-cols-1 gap-4 w-full px-4">${shuffledOptions.map(opt => `<button onclick="checkColorAnswer(this, '${opt}', '${c.name}')" class="color-btn option-btn p-5 text-2xl font-bold rounded-[30px] bg-white border-2 border-pink-100 text-pink-600 uppercase">${opt}</button>`).join('')}</div></div>`; speak("What color is this?"); 
        }
        function checkColorAnswer(btn, selected, correct) { const allBtns = document.querySelectorAll('.color-btn'); allBtns.forEach(b => b.disabled = true); if (selected === correct) { btn.classList.add('bg-pink-500', 'text-white', 'border-pink-600'); showFeedback("Great!", "bg-pink-500"); speak("Great! It is " + selected, () => { setTimeout(() => { colorIdx++; if (colorIdx < colorQuestions.length) renderColorQ(); else finishColors(); }, 1000); }); } else { showFeedback("Try again!", "bg-gray-400"); speak("That is not " + correct + ". Try again", () => allBtns.forEach(b => b.disabled = false)); } }
        function finishColors() { document.getElementById('colorsContainer').innerHTML = `<div class="py-20 animate-fade-in"><div class="text-9xl mb-6">🌈</div><h3 class="text-4xl font-bold text-pink-600 uppercase">Color Master!</h3><button onclick="startColorsGame()" class="mt-10 px-12 py-5 bg-pink-500 text-white rounded-full font-bold text-xl shadow-lg btn-bounce uppercase">Play Again</button></div>`; speak("You are a color master!"); }

        function showFeedback(text, colorClass) { const fb = document.getElementById('feedback'); fb.innerText = text; fb.className = `fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 px-10 py-5 rounded-full text-white font-bold text-3xl transition-all ${colorClass} opacity-100 z-[999] shadow-2xl`; setTimeout(() => fb.classList.replace('opacity-100', 'opacity-0'), 1500); }

        showView('menu');
    </script>
</body>
</html>
