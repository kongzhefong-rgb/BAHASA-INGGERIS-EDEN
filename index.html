<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lesson 1, 2 & 3 Learning App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fffaf5;
            user-select: none;
            overflow-x: hidden;
            touch-action: manipulation;
            color: #4a4a4a;
        }

        .btn-bounce:active { transform: scale(0.92); }

        .option-btn {
            transition: all 0.2s;
            box-shadow: 0 6px 0 #e5e5e5;
            -webkit-tap-highlight-color: transparent;
        }

        .option-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #e5e5e5;
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .highlight-text {
            color: #f97316;
            font-weight: 700;
            border-bottom: 4px solid #ffedd5;
            padding: 0 4px;
        }

        .success-pulse { animation: pulse 0.5s infinite alternate; }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }

        #audioUnlocker {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .bubble-left { background-color: #f3f4f6; border-radius: 20px 20px 20px 0; }
        .bubble-right { background-color: #dcfce7; border-radius: 20px 20px 0 20px; }

        /* 翻牌游戏样式 */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            perspective: 1000px;
        }

        .card {
            height: 120px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .card.flipped { transform: rotateY(180deg); }
        .card.matched { transform: rotateY(180deg) scale(0.95); opacity: 0.7; pointer-events: none; }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card-front {
            background-color: #ffedd5;
            border: 3px solid #fdba74;
            color: #f97316;
            font-size: 3rem;
        }

        .card-back {
            background-color: white;
            border: 3px solid #fb923c;
            transform: rotateY(180deg);
            padding: 10px;
            text-align: center;
        }

        .word-chip {
            background: white; border: 2px solid #e2e8f0; border-radius: 12px;
            padding: 12px 20px; font-weight: bold; font-size: 1.25rem;
            box-shadow: 0 4px 0 #e2e8f0; cursor: pointer; transition: all 0.1s;
        }
        .word-chip:active { transform: translateY(2px); box-shadow: 0 2px 0 #e2e8f0; }
        .word-chip.used { opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <audio id="bgm" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <div id="audioUnlocker">
        <div class="text-8xl mb-6">🎒</div>
        <h1 class="text-3xl font-bold text-orange-600 mb-2 uppercase tracking-tighter">Back to School</h1>
        <p class="text-gray-500 mb-8 font-bold text-lg">Kids Learning Assistant</p>
        <button onclick="unlockAudio()" class="px-12 py-5 bg-orange-500 text-white rounded-full font-bold text-2xl shadow-xl btn-bounce uppercase tracking-wide">
            Start Learning!
        </button>
    </div>

    <div id="app" class="max-w-md mx-auto w-full flex-grow flex flex-col shadow-2xl bg-white min-h-screen relative">
        
        <header class="p-4 flex items-center justify-between bg-orange-50 border-b-2 border-orange-100">
            <button id="homeBtn" class="text-orange-500 font-bold p-2 hidden">🏠 Home</button>
            <h1 id="headerTitle" class="text-xl font-bold text-orange-600 flex-grow text-center uppercase tracking-tight">English App</h1>
            <div class="w-10"></div>
        </header>

        <main id="mainContent" class="flex-grow p-6 flex flex-col">
            
            <!-- 课程主菜单 -->
            <div id="lessonMenuView" class="w-full space-y-4 fade-in text-center">
                <div class="py-2">
                    <div class="text-6xl mb-2">📚</div>
                    <h2 class="text-2xl font-bold text-gray-800 uppercase">Select Lesson</h2>
                </div>
                <div class="grid gap-4">
                    <button onclick="goToLesson(1)" class="p-6 bg-yellow-100 rounded-[30px] border-b-8 border-yellow-300 btn-bounce">
                        <div class="text-3xl mb-1">🏫</div>
                        <div class="text-xl font-bold text-yellow-800 uppercase leading-none">Lesson 1</div>
                        <div class="text-yellow-600 text-xs font-bold uppercase mt-1">Back to School</div>
                    </button>
                    <button onclick="goToLesson(2)" class="p-6 bg-blue-100 rounded-[30px] border-b-8 border-blue-300 btn-bounce">
                        <div class="text-3xl mb-1">👦</div>
                        <div class="text-xl font-bold text-blue-800 uppercase leading-none">Lesson 2</div>
                        <div class="text-blue-600 text-xs font-bold uppercase mt-1">Myself</div>
                    </button>
                    <button onclick="goToLesson(3)" class="p-6 bg-pink-100 rounded-[30px] border-b-8 border-pink-300 btn-bounce">
                        <div class="text-3xl mb-1">🏠</div>
                        <div class="text-xl font-bold text-pink-800 uppercase leading-none">Lesson 3</div>
                        <div class="text-pink-600 text-xs font-bold uppercase mt-1">My Family</div>
                    </button>
                </div>
            </div>

            <!-- 第一课子菜单 -->
            <div id="lesson1View" class="hidden w-full space-y-3 fade-in text-center">
                <div class="grid gap-3 pt-4">
                    <button onclick="showView('intro')" class="w-full p-4 bg-yellow-50 rounded-2xl border-2 border-yellow-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">👋</span>
                        <div><div class="font-bold text-base text-yellow-700 uppercase leading-none">Self Intro</div><div class="text-xs text-yellow-600">I am...</div></div>
                    </button>
                    <button onclick="showView('greetings')" class="w-full p-4 bg-purple-50 rounded-2xl border-2 border-purple-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">💬</span>
                        <div><div class="font-bold text-base text-purple-700 uppercase leading-none">Greetings</div><div class="text-xs text-purple-600">Morning, Night</div></div>
                    </button>
                    <button onclick="showView('playTime')" class="w-full p-4 bg-green-50 rounded-2xl border-2 border-green-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">🧸</span>
                        <div><div class="font-bold text-base text-green-700 uppercase leading-none">Play Time</div><div class="text-xs text-green-600">I am playing...</div></div>
                    </button>
                    <button onclick="showView('quiz')" class="w-full p-4 bg-blue-50 rounded-2xl border-2 border-blue-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">😊</span>
                        <div><div class="font-bold text-base text-blue-700 uppercase leading-none">Feelings</div><div class="text-xs text-blue-600">How do you feel?</div></div>
                    </button>
                    <button onclick="showView('colors')" class="w-full p-4 bg-pink-50 rounded-2xl border-2 border-pink-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">🌈</span>
                        <div><div class="font-bold text-base text-pink-700 uppercase leading-none">Color Fun</div><div class="text-xs text-pink-600">Rainbow</div></div>
                    </button>
                </div>
            </div>

            <!-- 第二课子菜单 -->
            <div id="lesson2View" class="hidden w-full space-y-4 fade-in text-center">
                <div class="grid gap-4 pt-4">
                    <button onclick="showView('bodyParts')" class="w-full p-6 bg-blue-50 rounded-[30px] border-2 border-blue-200 flex items-center space-x-6 btn-bounce text-left">
                        <span class="text-5xl">💪</span>
                        <div><div class="font-bold text-xl text-blue-800 uppercase tracking-widest leading-none">My Body</div><div class="text-sm text-blue-600 mt-1 uppercase">Arms, Legs, Feet</div></div>
                    </button>
                    <button onclick="showView('myFace')" class="w-full p-6 bg-orange-50 rounded-[30px] border-2 border-orange-200 flex items-center space-x-6 btn-bounce text-left">
                        <span class="text-5xl">👦</span>
                        <div><div class="font-bold text-xl text-orange-800 uppercase tracking-widest leading-none">My Face</div><div class="text-sm text-orange-600 italic mt-1 uppercase">Puzzle Game</div></div>
                    </button>
                </div>
            </div>

            <!-- 第三课子菜单 -->
            <div id="lesson3View" class="hidden w-full space-y-3 fade-in text-center">
                <div class="grid gap-3 pt-4">
                    <button onclick="showView('familyMembers')" class="w-full p-4 bg-pink-50 rounded-2xl border-2 border-pink-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">👨‍👩‍👧‍👦</span>
                        <div><div class="font-bold text-base text-pink-700 uppercase leading-none">Family</div><div class="text-xs text-pink-600 italic">Family Members</div></div>
                    </button>
                    <button onclick="showView('familyFlip')" class="w-full p-4 bg-orange-50 rounded-2xl border-2 border-orange-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">🃏</span>
                        <div><div class="font-bold text-base text-orange-700 uppercase leading-none">Flip Game</div><div class="text-xs text-orange-600 italic">Match the Cards</div></div>
                    </button>
                    <button onclick="showView('familyFun')" class="w-full p-4 bg-green-50 rounded-2xl border-2 border-green-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">🍲</span>
                        <div><div class="font-bold text-base text-green-700 uppercase leading-none">Family Fun</div><div class="text-xs text-green-600 italic">Building Sentences</div></div>
                    </button>
                </div>
            </div>

            <!-- 游戏区域容器 -->
            <div id="introView" class="hidden flex-grow flex flex-col"><div id="introGameContent" class="fade-in flex-grow flex flex-col"></div></div>
            <div id="greetingsView" class="hidden flex-grow flex flex-col fade-in"><div id="greetingsContainer" class="flex-grow flex flex-col space-y-4 py-2"></div></div>
            <div id="playTimeView" class="hidden flex-grow flex flex-col fade-in"><div id="playTimeContainer" class="flex-grow flex flex-col space-y-4 py-2"></div></div>
            <div id="quizView" class="hidden w-full text-center fade-in"><div id="quizContainer" class="space-y-6 flex flex-col items-center"></div></div>
            <div id="colorsView" class="hidden w-full text-center fade-in"><div id="colorsContainer" class="space-y-4 flex flex-col items-center"></div></div>
            <div id="bodyPartsView" class="hidden flex-grow flex flex-col fade-in"><div id="bodyPartsContainer" class="flex-grow flex flex-col space-y-4 py-2"></div></div>
            <div id="myFaceView" class="hidden flex-grow flex flex-col fade-in"><div id="myFaceContainer" class="flex-grow flex flex-col"></div></div>
            <div id="familyMembersView" class="hidden flex-grow flex flex-col fade-in"><div id="familyMembersContainer" class="flex-grow flex flex-col space-y-4 py-2"></div></div>
            <div id="familyFlipView" class="hidden flex-grow flex flex-col fade-in"><div id="familyFlipContainer" class="flex-grow flex flex-col space-y-4 py-2"></div></div>
            <div id="familyFunView" class="hidden flex-grow flex flex-col fade-in"><div id="familyFunContainer" class="flex-grow flex flex-col space-y-4 py-2"></div></div>

        </main>
    </div>

    <div id="feedback" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 px-10 py-5 rounded-3xl text-white font-bold text-3xl opacity-0 transition-opacity z-[999] pointer-events-none shadow-2xl"></div>

    <script>
        const views = ['lessonMenu', 'lesson1', 'lesson2', 'lesson3', 'intro', 'quiz', 'colors', 'greetings', 'playTime', 'bodyParts', 'myFace', 'familyMembers', 'familyFlip', 'familyFun'];
        let currentLesson = 1;
        let isAudioUnlocked = false;
        let bgmAudio = document.getElementById('bgm');

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function unlockAudio() {
            document.getElementById('audioUnlocker').style.display = 'none';
            isAudioUnlocked = true;
            playBGM();
            speak("Welcome! Let's learn together.");
        }

        function playBGM() { if (isAudioUnlocked) { bgmAudio.volume = 0.15; bgmAudio.play().catch(e => {}); } }
        function stopBGM() { bgmAudio.pause(); }

        // 核心语音控制：更新为 0.65 倍速 (极慢极清晰)
        function speak(text, callback) {
            if (!isAudioUnlocked) return;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance();
                let processedText = text.replace(/\bI\b/g, 'i');
                msg.text = processedText;
                msg.lang = 'en-GB'; 
                msg.rate = 0.65; // 慢语速
                msg.pitch = 1.1; 
                const voices = window.speechSynthesis.getVoices();
                const femaleVoice = voices.find(v => (v.name.includes('Female') || v.name.includes('UK English') || v.name.includes('Samantha')) && v.lang.startsWith('en'));
                if (femaleVoice) msg.voice = femaleVoice;
                
                let done = false;
                msg.onend = () => { if(!done){ done=true; if(callback) callback(); }};
                msg.onerror = () => { if(!done){ done=true; if(callback) callback(); }};
                window.speechSynthesis.speak(msg);
            } else if (callback) callback();
        }

        function goToLesson(n) { currentLesson = n; showView('lesson' + n); }

        function showView(viewName) {
            views.forEach(v => { const el = document.getElementById(v + 'View'); if(el) el.classList.add('hidden'); });
            const targetView = document.getElementById(viewName + 'View');
            if(targetView) targetView.classList.remove('hidden');
            
            document.getElementById('homeBtn').classList.toggle('hidden', viewName === 'lessonMenu');
            
            if (['lessonMenu', 'lesson1', 'lesson2', 'lesson3'].includes(viewName)) {
                playBGM();
                document.getElementById('headerTitle').innerText = viewName === 'lessonMenu' ? "Learning" : "Lesson " + currentLesson;
            } else {
                stopBGM();
                document.getElementById('headerTitle').innerText = "Playing";
            }

            if(viewName === 'intro') startIntroGame();
            if(viewName === 'quiz') startQuiz();
            if(viewName === 'colors') startColorsGame();
            if(viewName === 'greetings') startGreetingsGame();
            if(viewName === 'playTime') startPlayTimeGame();
            if(viewName === 'bodyParts') startBodyPartsGame();
            if(viewName === 'myFace') startMyFaceGame();
            if(viewName === 'familyMembers') startFamilyMembersGame();
            if(viewName === 'familyFlip') startFamilyFlipGame();
            if(viewName === 'familyFun') startFamilyFunGame();
        }

        document.getElementById('homeBtn').onclick = () => {
            window.speechSynthesis.cancel();
            const activeView = views.find(v => { const el = document.getElementById(v + 'View'); return el && !el.classList.contains('hidden'); });
            if (['lesson1', 'lesson2', 'lesson3'].includes(activeView)) showView('lessonMenu');
            else showView('lesson' + currentLesson);
        };

        // --- Lesson 3: 家庭成员数据 (更新: 改为 my pet) ---
        const familyData = [
            { name: 'father', icon: '👨' },
            { name: 'mother', icon: '👩' },
            { name: 'brother', icon: '👦' },
            { name: 'sister', icon: '👧' },
            { name: 'grandfather', icon: '👴' },
            { name: 'grandmother', icon: '👵' },
            { name: 'my pet', icon: '🐱' }
        ];

        let famIdx = 0;
        function startFamilyMembersGame() { famIdx = 0; renderFamilyStep(); }
        function renderFamilyStep() {
            const container = document.getElementById('familyMembersContainer');
            const data = familyData[famIdx];
            const other = familyData.filter(i => i.name !== data.name);
            const options = shuffleArray([data.name, other[Math.floor(Math.random()*other.length)].name]);
            
            container.innerHTML = `
                <div class="text-center space-y-6 py-4 animate-fade-in flex flex-col h-full">
                    <p class="text-gray-400 font-bold uppercase text-xs">Family ${famIdx + 1}/${familyData.length}</p>
                    <div class="flex justify-center"><div class="text-9xl p-10 bg-white rounded-full shadow-lg border-4 border-pink-100">${data.icon}</div></div>
                    <h3 class="text-3xl font-bold text-pink-800 uppercase italic">Who is this?</h3>
                    <div class="grid grid-cols-1 gap-4 px-4 mt-auto pb-8">
                        ${options.map(opt => `<button onclick="checkFamilyMember(this, '${opt}', '${data.name}')" class="p-6 text-2xl font-bold rounded-2xl bg-white border-2 border-gray-100 uppercase option-btn">${opt}</button>`).join('')}
                    </div>
                </div>`;
            speak(data.name);
        }

        function checkFamilyMember(btn, selected, correct) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b => b.disabled = true);
            if (selected === correct) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                showFeedback("Correct!", "bg-green-500");
                speak(correct, () => {
                    setTimeout(() => {
                        famIdx++;
                        if (famIdx < familyData.length) renderFamilyStep();
                        else finishFamilyMembers();
                    }, 1200);
                });
            } else { 
                showFeedback("Try again!", "bg-red-400"); 
                speak("Try again", () => allBtns.forEach(b => b.disabled = false)); 
            }
        }

        function finishFamilyMembers() {
            document.getElementById('familyMembersContainer').innerHTML = `<div class="text-center py-20 flex-grow flex flex-col justify-center animate-fade-in"><div class="text-9xl mb-6">👨‍👩‍👧‍👦</div><h2 class="text-4xl font-bold text-pink-600 uppercase">Family Master!</h2><button onclick="startFamilyMembersGame()" class="mx-auto mt-8 px-14 py-6 bg-pink-500 text-white rounded-full font-bold text-2xl shadow-xl btn-bounce uppercase">Play Again</button></div>`;
            speak("Well done! You know your family!");
        }

        // --- Lesson 3: 翻牌游戏 (翻一番) ---
        let flipCards = [];
        let flippedIndices = [];
        let matchedCount = 0;
        let memoryPageIdx = 0;

        function startFamilyFlipGame() { 
            memoryPageIdx = 0; 
            renderFlipPage(); 
        }

        function renderFlipPage() {
            const container = document.getElementById('familyFlipContainer');
            matchedCount = 0;
            flippedIndices = [];
            
            // 数据分段：3对, 3对, 1对
            const itemsPerPage = 3;
            const start = memoryPageIdx * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = familyData.slice(start, end);

            // 准备翻牌数据：图片卡 和 文字卡
            const cards = [];
            pageItems.forEach((item, idx) => {
                cards.push({ type: 'icon', val: item.icon, name: item.name });
                cards.push({ type: 'name', val: item.name, name: item.name });
            });
            flipCards = shuffleArray(cards);

            container.innerHTML = `
                <div class="text-center space-y-4 py-2 flex flex-col h-full animate-fade-in">
                    <p class="text-gray-400 font-bold uppercase text-xs">Memory Game - Page ${memoryPageIdx + 1}/3</p>
                    <h3 class="text-2xl font-bold text-orange-600 uppercase">Match the Cards!</h3>
                    <div class="memory-grid mt-4" id="memoryGrid">
                        ${flipCards.map((card, i) => `
                            <div class="card" id="card-${i}" onclick="handleCardFlip(${i})">
                                <div class="card-face card-front">❓</div>
                                <div class="card-face card-back">
                                    <div class="${card.type === 'icon' ? 'text-6xl' : 'text-xl font-bold text-orange-800 uppercase'}">${card.val}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="mt-auto pb-6">
                        <button onclick="startFamilyFlipGame()" class="text-orange-600 font-bold underline text-lg">Restart Game</button>
                    </div>
                </div>`;
            
            speak("Let's play a memory game! Match the cards.");
        }

        function handleCardFlip(idx) {
            const cardEl = document.getElementById(`card-${idx}`);
            if (cardEl.classList.contains('flipped') || flippedIndices.length === 2) return;

            cardEl.classList.add('flipped');
            flippedIndices.push(idx);
            
            const cardData = flipCards[idx];
            speak(cardData.name);

            if (flippedIndices.length === 2) {
                const [firstIdx, secondIdx] = flippedIndices;
                const card1 = flipCards[firstIdx];
                const card2 = flipCards[secondIdx];

                if (card1.name === card2.name) {
                    // 匹配成功
                    setTimeout(() => {
                        document.getElementById(`card-${firstIdx}`).classList.add('matched');
                        document.getElementById(`card-${secondIdx}`).classList.add('matched');
                        showFeedback("Matched!", "bg-green-500");
                        matchedCount++;
                        flippedIndices = [];
                        
                        // 检查当前页面是否完成
                        if (matchedCount === (flipCards.length / 2)) {
                            setTimeout(() => {
                                memoryPageIdx++;
                                if (memoryPageIdx < 3) {
                                    renderFlipPage();
                                } else {
                                    finishFamilyFlip();
                                }
                            }, 1200);
                        }
                    }, 800);
                } else {
                    // 匹配失败，翻回去
                    setTimeout(() => {
                        document.getElementById(`card-${firstIdx}`).classList.remove('flipped');
                        document.getElementById(`card-${secondIdx}`).classList.remove('flipped');
                        flippedIndices = [];
                    }, 1200);
                }
            }
        }

        function finishFamilyFlip() {
            document.getElementById('familyFlipContainer').innerHTML = `<div class="text-center py-20 flex-grow flex flex-col justify-center animate-fade-in"><div class="text-9xl mb-6">🎯</div><h2 class="text-4xl font-bold text-orange-600 uppercase">You Win!</h2><button onclick="startFamilyFlipGame()" class="mx-auto mt-8 px-14 py-6 bg-orange-500 text-white rounded-full font-bold text-2xl shadow-xl btn-bounce uppercase">Play Again</button></div>`;
            speak("Perfect! You matched all the cards!");
        }

        // --- Lesson 3: 家庭排句子游戏 ---
        const sentenceData = [
            { photo: '👩‍🍳', words: ['I', 'cook with', 'my mother.'], full: "I cook with my mother." },
            { photo: '👨‍👦', words: ['I', 'play ball with', 'my father.'], full: "I play ball with my father." },
            { photo: '👵👴', words: ['I', 'read with', 'my grandparents.'], full: "I read with my grandparents." },
            { photo: '👧🎨', words: ['I', 'draw with', 'my sister.'], full: "I draw with my sister." },
            { photo: '👦👶', words: ['I', 'play with my', 'baby brother.'], full: "I play with my baby brother." },
            { photo: '👨‍👩‍👧‍👦', words: ['I', 'eat with', 'my family.'], full: "I eat with my family." }
        ];

        let sentIdx = 0;
        let buildWords = [];

        function startFamilyFunGame() { sentIdx = 0; renderSentStep(); }
        function renderSentStep() {
            const data = sentenceData[sentIdx];
            buildWords = [];
            const shuffled = shuffleArray([...data.words]);
            const container = document.getElementById('familyFunContainer');
            
            container.innerHTML = `
                <div class="text-center space-y-4 py-2 flex flex-col h-full animate-fade-in">
                    <p class="text-gray-400 font-bold uppercase text-xs">Step ${sentIdx + 1}/6</p>
                    <div class="flex justify-center mt-2">
                        <div class="text-9xl p-4 bg-white rounded-3xl shadow-md border-2 border-green-50">${data.photo}</div>
                    </div>
                    <div class="p-6 bg-green-50 rounded-[30px] border-2 border-green-100 min-h-[120px] flex flex-wrap items-center justify-center gap-3" id="sentOutput">
                        <span class="text-gray-300 italic text-lg">Tap the words below...</span>
                    </div>
                    <div class="flex flex-wrap justify-center gap-3 mt-4" id="sentWordBin">
                        ${shuffled.map(w => `<button onclick="addWordToSent(this, '${w.replace(/'/g, "\\'")}')" class="word-chip">${w}</button>`).join('')}
                    </div>
                    <div class="mt-auto pb-6">
                        <button onclick="renderSentStep()" class="text-green-600 font-bold underline text-lg">Reset Sentence</button>
                    </div>
                </div>`;
            speak(data.full);
        }

        function addWordToSent(btn, word) {
            const data = sentenceData[sentIdx];
            btn.classList.add('used');
            buildWords.push(word);
            
            const output = document.getElementById('sentOutput');
            if (buildWords.length === 1) output.innerHTML = '';
            output.innerHTML += `<span class="text-2xl font-bold text-green-800 fade-in px-1">${word}</span>`;
            
            speak(word);

            if (buildWords.length === data.words.length) {
                const check = buildWords.join(' ') === data.words.join(' ');
                if (check) {
                    output.classList.add('success-pulse', 'bg-green-100');
                    showFeedback("Perfect!", "bg-green-500");
                    speak(data.full, () => {
                        setTimeout(() => {
                            sentIdx++;
                            if (sentIdx < sentenceData.length) renderSentStep();
                            else finishFamilyFun();
                        }, 1800);
                    });
                } else {
                    showFeedback("Check order!", "bg-red-400");
                    speak("Let's try that again.");
                    setTimeout(renderSentStep, 1500);
                }
            }
        }

        function finishFamilyFun() {
            document.getElementById('familyFunContainer').innerHTML = `<div class="text-center py-20 flex-grow flex flex-col justify-center animate-fade-in"><div class="text-9xl mb-6">🏆</div><h3 class="text-4xl font-bold text-green-600 uppercase">Sentence Star!</h3><button onclick="startFamilyFunGame()" class="mt-10 px-14 py-6 bg-green-500 text-white rounded-full font-bold text-2xl shadow-xl btn-bounce uppercase">Play Again</button></div>`;
            speak("Fantastic! You can build great sentences!");
        }

        // --- Lesson 1, 2 逻辑省略 (保持原有稳定功能) ---
        function startIntroGame() { introState.gender = null; introState.step = 0; renderIntroStep(); }
        let introState = { gender: null, step: 0 };
        function selectGender(g) { introState.gender = g; speak("I am a " + g, () => renderIntroStep()); }
        function renderIntroStep() {
            const container = document.getElementById('introGameContent');
            if (introState.gender === null) {
                container.innerHTML = `<div class="text-center space-y-12 py-12 flex-grow flex flex-col justify-center animate-fade-in"><h2 class="text-3xl font-bold text-gray-700 uppercase">Are you a boy or a girl?</h2><div class="flex justify-around items-center"><button onclick="selectGender('boy')" class="flex flex-col items-center btn-bounce"><div class="text-8xl p-8 bg-blue-50 rounded-full border-4 border-blue-200">👦</div><span class="mt-4 font-bold text-blue-600 text-2xl">Boy</span></button><button onclick="selectGender('girl')" class="flex flex-col items-center btn-bounce"><div class="text-8xl p-8 bg-pink-50 rounded-full border-4 border-pink-200">👧</div><span class="mt-4 font-bold text-pink-600 text-2xl">Girl</span></button></div></div>`;
                speak("Are you a boy or a girl?"); return;
            }
            const data = {
                boy: [{ img: '👦', sentence: "My name is <span class='highlight-text'>______</span>.", full: "My name is Eden.", options: ['Effie', 'Eden', 'Janice'], correct: 'Eden' }, { img: '5️⃣', sentence: "I am <span class='highlight-text'>___</span> years old.", full: "I am five years old.", options: ['four', 'five', 'six'], correct: 'five' }, { img: '👦', sentence: "I am a <span class='highlight-text'>____</span>.", full: "I am a boy.", options: ['boy', 'girl'], correct: 'boy' }],
                girl: [{ img: '👧', sentence: "My name is <span class='highlight-text'>______</span>.", full: "My name is Effie.", options: ['Effie', 'Eden', 'Janice'], correct: 'Effie' }, { img: '3️⃣', sentence: "I am <span class='highlight-text'>___</span> years old.", full: "I am three years old.", options: ['two', 'three', 'four'], correct: 'three' }, { img: '👧', sentence: "I am a <span class='highlight-text'>____</span>.", full: "I am a girl.", options: ['boy', 'girl'], correct: 'girl' }]
            };
            const current = data[introState.gender][introState.step];
            container.innerHTML = `<div class="text-center py-10"><div class="text-9xl mb-10">${current.img}</div><div class="p-6 bg-orange-50 rounded-[30px] border-2 border-orange-100"><p class="text-2xl leading-relaxed font-bold">${current.sentence}</p></div><div class="grid gap-4 mt-10">${shuffleArray(current.options).map(o => `<button onclick="checkIntroAnswer(this, '${o}')" class="option-btn p-4 text-xl font-bold rounded-2xl bg-white border-2 border-gray-100 uppercase">${o}</button>`).join('')}</div></div>`;
            speak(current.full);
        }
        function checkIntroAnswer(btn, selected) {
            const data = { boy: [{correct:'Eden'}, {correct:'five'}, {correct:'boy'}], girl: [{correct:'Effie'}, {correct:'three'}, {correct:'girl'}] };
            if (selected === data[introState.gender][introState.step].correct) {
                btn.classList.add('bg-green-500', 'text-white');
                speak(selected, () => { introState.step++; if (introState.step < 3) renderIntroStep(); else showView('lesson1'); });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }

        function startGreetingsGame() { greetingIdx = 0; renderGreetingStep(); }
        let greetingIdx = 0;
        function renderGreetingStep() {
            const data = [{ icon: '☀️', prompt: "Good morning!", correct: "Good morning" }, { icon: '🌤️', prompt: "Good afternoon!", correct: "Good afternoon" }, { icon: '🌙', prompt: "Good night!", correct: "Good night" }, { icon: '⚽', prompt: "Can I play with you?", correct: "Yes, you can" }, { icon: '🧸', prompt: "Do you want to play with me?", correct: "Yes, I do" }];
            const step = data[greetingIdx];
            document.getElementById('greetingsContainer').innerHTML = `<div class="text-center py-10"><div class="text-9xl mb-10">${step.icon}</div><div class="text-3xl font-bold mb-10">${step.prompt}</div><div class="flex flex-col gap-4">${shuffleArray([step.correct, "No thank you"]).map(o => `<button onclick="this.innerText.includes('${step.correct}') ? (greetingIdx++, greetingIdx < 5 ? renderGreetingStep() : showView('lesson1')) : showFeedback('Try again', 'bg-red-400')" class="p-6 bg-white border-2 rounded-2xl font-bold text-xl uppercase">${o}</button>`).join('')}</div></div>`;
            speak(step.prompt);
        }

        function startPlayTimeGame() { playStep = 0; renderPlayStep(); }
        let playStep = 0;
        function renderPlayStep() {
            const data = [{ icon: '🧱', full: "I am playing with blocks.", correct: 'blocks' }, { icon: '🧩', full: "I am playing with puzzles.", correct: 'puzzles' }, { icon: '🛝', full: "I am playing on the slide.", correct: 'slide' }, { icon: '🏖️', full: "I am playing with sand.", correct: 'sand' }];
            const step = data[playStep];
            document.getElementById('playTimeContainer').innerHTML = `<div class="text-center py-10"><div class="text-9xl mb-10">${step.icon}</div><div class="text-3xl font-bold mb-10">${step.full}</div><div class="flex gap-4 justify-center">${shuffleArray([step.correct, "toy"]).map(o => `<button onclick="this.innerText.includes('${step.correct}') ? (playStep++, playStep < 4 ? renderPlayStep() : showView('lesson1')) : showFeedback('Try again', 'bg-red-400')" class="p-6 bg-white border-2 rounded-2xl font-bold text-xl uppercase">${o}</button>`).join('')}</div></div>`;
            speak(step.full);
        }

        function startQuiz() { quizIdx = 0; renderQuizQ(); }
        let quizIdx = 0;
        function renderQuizQ() {
            const data = [{ img: '😊', correct: 'Happy' }, { img: '👌', correct: 'Fine' }, { img: '😢', correct: 'Sad' }, { img: '😰', correct: 'Nervous' }];
            const q = data[quizIdx];
            document.getElementById('quizContainer').innerHTML = `<div class="text-center py-10"><div class="text-9xl mb-10">${q.img}</div><div class="text-3xl font-bold mb-10">How do you feel?</div><div class="flex flex-col gap-4">${shuffleArray([q.correct, "Angry"]).map(o => `<button onclick="this.innerText.includes('${q.correct}') ? (quizIdx++, quizIdx < 4 ? renderQuizQ() : showView('lesson1')) : showFeedback('Try again', 'bg-red-400')" class="p-6 bg-white border-2 rounded-2xl font-bold text-xl uppercase">${o}</button>`).join('')}</div></div>`;
            speak("How do you feel?");
        }

        function startColorsGame() { colorIdx = 0; renderColorQ(); }
        let colorIdx = 0;
        function renderColorQ() {
            const data = [{ hex: '#FF0000', name: 'Red' }, { hex: '#0000FF', name: 'Blue' }, { hex: '#FFFF00', name: 'Yellow' }];
            const c = data[colorIdx];
            document.getElementById('colorsContainer').innerHTML = `<div class="text-center py-10"><div class="w-48 h-48 rounded-full mx-auto mb-10" style="background:${c.hex}"></div><div class="text-3xl font-bold mb-10">What color is this?</div><div class="flex flex-col gap-4">${shuffleArray([c.name, "Black"]).map(o => `<button onclick="this.innerText.includes('${c.name}') ? (colorIdx++, colorIdx < 3 ? renderColorQ() : showView('lesson1')) : showFeedback('Try again', 'bg-red-400')" class="p-6 bg-white border-2 rounded-2xl font-bold text-xl uppercase">${o}</button>`).join('')}</div></div>`;
            speak("What color is this?");
        }

        function startBodyPartsGame() { bodyStep = 0; renderBodyStep(); }
        let bodyStep = 0;
        function renderBodyStep() {
            const data = [{ icon: '💆', full: "This is my head.", correct: 'head' }, { icon: '💪', full: "These are my arms.", correct: 'arms' }];
            const step = data[bodyStep];
            document.getElementById('bodyPartsContainer').innerHTML = `<div class="text-center py-10"><div class="text-9xl mb-10">${step.icon}</div><div class="text-3xl font-bold mb-10">${step.full}</div><div class="flex gap-4 justify-center">${shuffleArray([step.correct, "leg"]).map(o => `<button onclick="this.innerText.includes('${step.correct}') ? (bodyStep++, bodyStep < 2 ? renderBodyStep() : showView('lesson2')) : showFeedback('Try again', 'bg-red-400')" class="p-6 bg-white border-2 rounded-2xl font-bold text-xl uppercase">${o}</button>`).join('')}</div></div>`;
            speak(step.full);
        }

        function startMyFaceGame() {
            document.getElementById('myFaceContainer').innerHTML = `<div class="face-canvas shadow-lg"><div class="target-zone" style="top:100px;left:60px">👀</div><div class="target-zone" style="top:100px;left:165px">👀</div></div><div class="text-center mt-10"><p class="text-xl font-bold">This is a beautiful face!</p><button onclick="showView('lesson2')" class="mt-4 p-4 bg-orange-500 text-white rounded-xl">Back</button></div>`;
            speak("This is a beautiful face!");
        }

        function showFeedback(text, colorClass) {
            const fb = document.getElementById('feedback'); fb.innerText = text;
            fb.className = `fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 px-10 py-5 rounded-full text-white font-bold text-3xl transition-all ${colorClass} opacity-100 z-[999] shadow-2xl`;
            setTimeout(() => fb.classList.replace('opacity-100', 'opacity-0'), 1500);
        }

        showView('lessonMenu');
    </script>
</body>
</html>
