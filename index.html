<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lesson 1 & 2 Learning App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fffaf5;
            user-select: none;
            overflow-x: hidden;
            touch-action: manipulation;
            color: #4a4a4a;
        }

        .btn-bounce:active { transform: scale(0.92); }

        .option-btn {
            transition: all 0.2s;
            box-shadow: 0 6px 0 #e5e5e5;
            -webkit-tap-highlight-color: transparent;
        }

        .option-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #e5e5e5;
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .highlight-text {
            color: #f97316;
            font-weight: 700;
            border-bottom: 4px solid #ffedd5;
            padding: 0 4px;
        }

        .success-pulse { animation: pulse 0.5s infinite alternate; }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.03); }
        }

        #audioUnlocker {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .bubble-left { background-color: #f3f4f6; border-radius: 20px 20px 20px 0; }
        .bubble-right { background-color: #dcfce7; border-radius: 20px 20px 0 20px; }

        /* 脸部拼图画布 */
        .face-canvas {
            position: relative;
            width: 260px;
            height: 300px;
            background-color: #ffe4d1;
            border-radius: 120px 120px 140px 140px;
            margin: 20px auto;
            border: 4px solid #f3d1b8;
            box-shadow: inset 0 -10px 0 rgba(0,0,0,0.05);
        }

        .target-zone {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            transition: all 0.3s;
        }

        .face-part {
            cursor: pointer;
            transition: transform 0.2s;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            width: 4rem;
            height: 4rem;
            font-size: 2.5rem;
        }
        
        .face-part.placed {
            opacity: 0.3;
            pointer-events: none;
        }

        .part-bin {
            background: #fff;
            border: 2px solid #eee;
            border-radius: 20px;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            min-height: 100px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- 背景音乐 -->
    <audio id="bgm" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg">
    </audio>

    <!-- 启动点击层 -->
    <div id="audioUnlocker">
        <div class="text-8xl mb-6">🎒</div>
        <h1 class="text-3xl font-bold text-orange-600 mb-2 uppercase tracking-tighter">Back to School</h1>
        <p class="text-gray-500 mb-8 font-bold text-lg">Kids Learning Assistant</p>
        <button onclick="unlockAudio()" class="px-12 py-5 bg-orange-500 text-white rounded-full font-bold text-2xl shadow-xl btn-bounce uppercase tracking-wide">
            Start Learning!
        </button>
    </div>

    <div id="app" class="max-w-md mx-auto w-full flex-grow flex flex-col shadow-2xl bg-white min-h-screen relative">
        
        <header class="p-4 flex items-center justify-between bg-orange-50 border-b-2 border-orange-100">
            <button id="homeBtn" class="text-orange-500 font-bold p-2 hidden">🏠 Home</button>
            <h1 id="headerTitle" class="text-xl font-bold text-orange-600 flex-grow text-center uppercase tracking-tight">English App</h1>
            <div class="w-10"></div>
        </header>

        <main id="mainContent" class="flex-grow p-6 flex flex-col">
            
            <!-- 课程菜单 -->
            <div id="lessonMenuView" class="w-full space-y-6 fade-in text-center">
                <div class="py-4">
                    <div class="text-7xl mb-4">📚</div>
                    <h2 class="text-3xl font-bold text-gray-800 uppercase">Select Lesson</h2>
                </div>
                <div class="grid gap-6">
                    <button onclick="goToLesson(1)" class="p-8 bg-yellow-100 rounded-[40px] border-b-8 border-yellow-300 btn-bounce">
                        <div class="text-4xl mb-2">🏫</div>
                        <div class="text-2xl font-bold text-yellow-800 uppercase leading-none">Lesson 1</div>
                        <div class="text-yellow-600 font-bold uppercase mt-1">Back to School</div>
                    </button>
                    <button onclick="goToLesson(2)" class="p-8 bg-blue-100 rounded-[40px] border-b-8 border-blue-300 btn-bounce">
                        <div class="text-4xl mb-2">👦</div>
                        <div class="text-2xl font-bold text-blue-800 uppercase leading-none">Lesson 2</div>
                        <div class="text-blue-600 font-bold uppercase mt-1">Myself</div>
                    </button>
                </div>
            </div>

            <!-- 第一课子菜单 -->
            <div id="lesson1View" class="hidden w-full space-y-3 fade-in text-center">
                <div class="grid gap-3 pt-4">
                    <button onclick="showView('intro')" class="w-full p-4 bg-yellow-50 rounded-2xl border-2 border-yellow-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">👋</span>
                        <div><div class="font-bold text-base text-yellow-700 uppercase leading-none">Self Intro</div><div class="text-xs text-yellow-600">I am...</div></div>
                    </button>
                    <button onclick="showView('greetings')" class="w-full p-4 bg-purple-50 rounded-2xl border-2 border-purple-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">💬</span>
                        <div><div class="font-bold text-base text-purple-700 uppercase leading-none">Greetings</div><div class="text-xs text-purple-600">Morning, Night</div></div>
                    </button>
                    <button onclick="showView('playTime')" class="w-full p-4 bg-green-50 rounded-2xl border-2 border-green-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">🧸</span>
                        <div><div class="font-bold text-base text-green-700 uppercase leading-none">Play Time</div><div class="text-xs text-green-600">I am playing...</div></div>
                    </button>
                    <button onclick="showView('quiz')" class="w-full p-4 bg-blue-50 rounded-2xl border-2 border-blue-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">😊</span>
                        <div><div class="font-bold text-base text-blue-700 uppercase leading-none">Feelings</div><div class="text-xs text-blue-600">How do you feel?</div></div>
                    </button>
                    <button onclick="showView('colors')" class="w-full p-4 bg-pink-50 rounded-2xl border-2 border-pink-200 flex items-center space-x-4 btn-bounce text-left">
                        <span class="text-3xl">🌈</span>
                        <div><div class="font-bold text-base text-pink-700 uppercase leading-none">Color Fun</div><div class="text-xs text-pink-600">Rainbow</div></div>
                    </button>
                </div>
            </div>

            <!-- 第二课子菜单 -->
            <div id="lesson2View" class="hidden w-full space-y-4 fade-in text-center">
                <div class="grid gap-4 pt-4">
                    <button onclick="showView('bodyParts')" class="w-full p-6 bg-blue-50 rounded-[30px] border-2 border-blue-200 flex items-center space-x-6 btn-bounce text-left">
                        <span class="text-5xl">💪</span>
                        <div>
                            <div class="font-bold text-xl text-blue-800 uppercase tracking-widest leading-none">My Body</div>
                            <div class="text-sm text-blue-600 mt-1 uppercase">Arms, Legs, Feet</div>
                        </div>
                    </button>
                    <button onclick="showView('myFace')" class="w-full p-6 bg-orange-50 rounded-[30px] border-2 border-orange-200 flex items-center space-x-6 btn-bounce text-left">
                        <span class="text-5xl">👦</span>
                        <div>
                            <div class="font-bold text-xl text-orange-800 uppercase tracking-widest leading-none">My Face</div>
                            <div class="text-sm text-orange-600 italic mt-1 uppercase">Puzzle Game</div>
                        </div>
                    </button>
                </div>
            </div>

            <!-- 游戏区域 -->
            <div id="introView" class="hidden flex-grow flex flex-col"><div id="introGameContent" class="fade-in flex-grow flex flex-col"></div></div>
            <div id="greetingsView" class="hidden flex-grow flex flex-col fade-in"><div id="greetingsContainer" class="flex-grow flex flex-col space-y-4 py-2"></div></div>
            <div id="playTimeView" class="hidden flex-grow flex flex-col fade-in"><div id="playTimeContainer" class="flex-grow flex flex-col space-y-4 py-2"></div></div>
            <div id="quizView" class="hidden w-full text-center fade-in"><div id="quizContainer" class="space-y-6 flex flex-col items-center"></div></div>
            <div id="colorsView" class="hidden w-full text-center fade-in"><div id="colorsContainer" class="space-y-4 flex flex-col items-center"></div></div>
            <div id="bodyPartsView" class="hidden flex-grow flex flex-col fade-in"><div id="bodyPartsContainer" class="flex-grow flex flex-col space-y-4 py-2"></div></div>
            
            <div id="myFaceView" class="hidden flex-grow flex flex-col fade-in">
                <div id="myFaceContainer" class="flex-grow flex flex-col">
                    <p class="text-center text-orange-600 font-bold uppercase text-xs tracking-widest">Puzzle Game</p>
                    <div class="face-canvas shadow-lg" id="faceCanvas">
                        <div class="target-zone" id="target-hair" style="top: -10px; left: 0px; width: 260px; height: 80px; font-size: 5rem; z-index: 10;"></div>
                        <div class="target-zone" id="target-eyebrow-left" style="top: 75px; left: 55px; width: 45px; height: 15px; font-size: 1.5rem;"></div>
                        <div class="target-zone" id="target-eyebrow-right" style="top: 75px; left: 160px; width: 45px; height: 15px; font-size: 1.5rem;"></div>
                        <div class="target-zone" id="target-eyes-left" style="top: 105px; left: 60px; width: 40px; height: 40px;"></div>
                        <div class="target-zone" id="target-eyes-right" style="top: 105px; left: 165px; width: 40px; height: 40px;"></div>
                        <div class="target-zone" id="target-nose" style="top: 150px; left: 110px; width: 40px; height: 40px;"></div>
                        <div class="target-zone" id="target-mouth" style="top: 205px; left: 80px; width: 100px; height: 50px;"></div>
                        <div class="target-zone" id="target-ears-left" style="top: 125px; left: -30px; width: 40px; height: 50px;"></div>
                        <div class="target-zone" id="target-ears-right" style="top: 125px; left: 250px; width: 40px; height: 50px;"></div>
                        <div class="target-zone" id="target-tongue" style="top: 220px; left: 115px; width: 30px; height: 25px; z-index: 5; font-size: 1.5rem;"></div>
                    </div>
                    <div class="text-center mb-4">
                        <div id="facePrompt" class="text-2xl font-bold text-orange-700 bg-orange-100 py-2 rounded-2xl mx-10 shadow-sm animate-pulse uppercase">Listen...</div>
                    </div>
                    <div class="part-bin shadow-inner" id="partBin"></div>
                    <button onclick="startMyFaceGame()" class="mt-4 w-full py-4 bg-orange-500 text-white rounded-2xl font-bold shadow-lg uppercase btn-bounce">Restart Puzzle</button>
                </div>
            </div>
        </main>
    </div>

    <div id="feedback" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 px-10 py-5 rounded-3xl text-white font-bold text-3xl opacity-0 transition-opacity z-[999] pointer-events-none shadow-2xl"></div>

    <script>
        const views = ['lessonMenu', 'lesson1', 'lesson2', 'intro', 'quiz', 'colors', 'greetings', 'playTime', 'bodyParts', 'myFace'];
        let currentLesson = 1;
        let isAudioUnlocked = false;
        let bgmAudio = document.getElementById('bgm');

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // 修复：优化解锁逻辑，确保先隐藏 UI 再播放声音
        function unlockAudio() {
            document.getElementById('audioUnlocker').style.display = 'none';
            isAudioUnlocked = true;
            playBGM();
            speak("Welcome! Let's learn together.");
        }

        function playBGM() { if (isAudioUnlocked) { bgmAudio.volume = 0.15; bgmAudio.play().catch(e => {}); } }
        function stopBGM() { bgmAudio.pause(); }

        function speak(text, callback) {
            if (!isAudioUnlocked) return;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance();
                msg.text = text;
                msg.lang = 'en-GB'; 
                msg.rate = 0.8; // 适合孩子的清晰慢语速
                msg.pitch = 1.1; 
                const voices = window.speechSynthesis.getVoices();
                const femaleVoice = voices.find(v => (v.name.includes('Female') || v.name.includes('UK English') || v.name.includes('Samantha')) && v.lang.startsWith('en'));
                if (femaleVoice) msg.voice = femaleVoice;
                
                let done = false;
                msg.onend = () => { if(!done){ done=true; if(callback) callback(); }};
                msg.onerror = () => { if(!done){ done=true; if(callback) callback(); }};
                window.speechSynthesis.speak(msg);
            } else if (callback) callback();
        }

        function goToLesson(n) { currentLesson = n; showView('lesson' + n); }

        function showView(viewName) {
            views.forEach(v => { const el = document.getElementById(v + 'View'); if(el) el.classList.add('hidden'); });
            const targetView = document.getElementById(viewName + 'View');
            if(targetView) targetView.classList.remove('hidden');
            
            document.getElementById('homeBtn').classList.toggle('hidden', viewName === 'lessonMenu');
            
            if (['lessonMenu', 'lesson1', 'lesson2'].includes(viewName)) {
                playBGM();
                document.getElementById('headerTitle').innerText = viewName === 'lessonMenu' ? "Learning" : "Lesson " + currentLesson;
            } else {
                stopBGM();
                document.getElementById('headerTitle').innerText = "Playing";
            }

            if(viewName === 'intro') startIntroGame();
            if(viewName === 'quiz') startQuiz();
            if(viewName === 'colors') startColorsGame();
            if(viewName === 'greetings') startGreetingsGame();
            if(viewName === 'playTime') startPlayTimeGame();
            if(viewName === 'bodyParts') startBodyPartsGame();
            if(viewName === 'myFace') startMyFaceGame();
        }

        document.getElementById('homeBtn').onclick = () => {
            window.speechSynthesis.cancel();
            const activeView = views.find(v => { const el = document.getElementById(v + 'View'); return el && !el.classList.contains('hidden'); });
            if (activeView === 'lesson1' || activeView === 'lesson2') {
                showView('lessonMenu');
            } else {
                showView('lesson' + currentLesson);
            }
        };

        // --- Lesson 1: 自我介绍 ---
        const introData = {
            boy: [
                { img: '👦', sentence: "My name is <span class='highlight-text'>______</span>.", full: "My name is Eden.", options: ['Effie', 'Eden', 'Janice'], correct: 'Eden' },
                { img: '5️⃣', sentence: "I am <span class='highlight-text'>___</span> years old.", full: "I am five years old.", options: ['four', 'five', 'six'], correct: 'five' },
                { img: '👦', sentence: "I am a <span class='highlight-text'>____</span>.", full: "I am a boy.", options: ['boy', 'girl'], correct: 'boy' }
            ],
            girl: [
                { img: '👧', sentence: "My name is <span class='highlight-text'>______</span>.", full: "My name is Effie.", options: ['Effie', 'Eden', 'Janice'], correct: 'Effie' },
                { img: '3️⃣', sentence: "I am <span class='highlight-text'>___</span> years old.", full: "I am three years old.", options: ['two', 'three', 'four'], correct: 'three' },
                { img: '👧', sentence: "I am a <span class='highlight-text'>____</span>.", full: "I am a girl.", options: ['boy', 'girl'], correct: 'girl' }
            ]
        };
        let introState = { gender: null, step: 0 };
        function startIntroGame() { introState.gender = null; introState.step = 0; renderIntroStep(); }
        function selectGender(g) { introState.gender = g; speak("I am a " + g, () => renderIntroStep()); }
        function renderIntroStep() {
            const container = document.getElementById('introGameContent');
            if (introState.gender === null) {
                container.innerHTML = `<div class="text-center space-y-12 py-12 flex-grow flex flex-col justify-center animate-fade-in"><h2 class="text-3xl font-bold text-gray-700 uppercase">Are you a boy or a girl?</h2><div class="flex justify-around items-center"><button onclick="selectGender('boy')" class="flex flex-col items-center btn-bounce"><div class="text-8xl p-8 bg-blue-50 rounded-full border-4 border-blue-200">👦</div><span class="mt-4 font-bold text-blue-600 text-2xl">Boy</span></button><button onclick="selectGender('girl')" class="flex flex-col items-center btn-bounce"><div class="text-8xl p-8 bg-pink-50 rounded-full border-4 border-pink-200">👧</div><span class="mt-4 font-bold text-pink-600 text-2xl">Girl</span></button></div></div>`;
                speak("Are you a boy or a girl?"); return;
            }
            const currentData = introData[introState.gender][introState.step];
            const shuffled = shuffleArray(currentData.options);
            container.innerHTML = `<div class="text-center space-y-6 py-4 flex flex-col h-full animate-fade-in"><div class="flex justify-center mt-2"><div class="text-8xl p-8 bg-white rounded-full shadow-lg border-2 border-orange-50">${currentData.img}</div></div><div class="p-6 bg-orange-50 rounded-[30px] mx-2 border-2 border-orange-100" id="textContainer"><p id="sentenceDisplay" class="text-2xl leading-relaxed font-bold">${currentData.sentence}</p></div><div class="grid grid-cols-1 gap-4 px-4 pb-8 mt-auto">${shuffled.map(opt => `<button onclick="checkIntroAnswer(this, '${opt}')" class="option-btn p-4 text-xl font-bold rounded-2xl bg-white border-2 border-gray-100 uppercase">${opt}</button>`).join('')}</div></div>`;
            speak(currentData.full);
        }
        function checkIntroAnswer(btn, selected) {
            const currentData = introData[introState.gender][introState.step];
            if (selected === currentData.correct) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                document.getElementById('sentenceDisplay').innerHTML = currentData.full;
                speak(currentData.full, () => {
                    setTimeout(() => {
                        introState.step++;
                        if (introState.step < 3) renderIntroStep();
                        else showIntroFinish();
                    }, 1200);
                });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }
        function showIntroFinish() { 
            document.getElementById('introGameContent').innerHTML = `<div class="text-center py-20 flex-grow flex flex-col justify-center animate-fade-in"><div class="text-9xl">🥳</div><h2 class="text-4xl font-bold text-orange-600 uppercase">Excellent!</h2><button onclick="startIntroGame()" class="mx-auto mt-8 px-14 py-6 bg-orange-500 text-white rounded-full font-bold text-2xl shadow-2xl btn-bounce uppercase">Play Again</button></div>`;
            speak("Well done! You are fantastic!");
        }

        // --- Lesson 1: 对话练习 ---
        let greetingIdx = 0;
        const greetingData = [
            { icon: '☀️', prompt: "Good morning!", options: ["Good morning", "Good afternoon"], correct: "Good morning" },
            { icon: '🌤️', prompt: "Good afternoon!", options: ["Good afternoon", "Good evening"], correct: "Good afternoon" },
            { icon: '🌙', prompt: "Good night!", options: ["Good morning", "Good night"], correct: "Good night" },
            { icon: '⚽', prompt: "Can I play with you?", options: ["Yes, you can", "Good morning"], correct: "Yes, you can" },
            { icon: '🧸', prompt: "Do you want to play with me?", options: ["Yes, I do", "Good night"], correct: "Yes, I do" }
        ];
        function startGreetingsGame() { greetingIdx = 0; renderGreetingStep(); }
        function renderGreetingStep() {
            const container = document.getElementById('greetingsContainer');
            const data = greetingData[greetingIdx];
            const shuffled = shuffleArray(data.options);
            container.innerHTML = `<div class="flex flex-col h-full animate-fade-in"><p class="text-center text-gray-400 font-bold uppercase text-xs mb-2">Step ${greetingIdx + 1}/5</p><div class="flex items-start space-x-3 mb-8"><div class="text-4xl p-2 bg-orange-100 rounded-full">👩‍🏫</div><div class="bubble-left p-4 text-xl font-bold shadow-sm">${data.prompt} ${data.icon}</div></div><div id="userReplyArea" class="flex items-end justify-end space-x-3 mb-auto opacity-40"><div class="bubble-right p-4 text-xl font-bold shadow-sm"><span id="replyText">......</span></div><div class="text-4xl p-2 bg-green-100 rounded-full">👦</div></div><div class="grid grid-cols-1 gap-4 mt-auto pb-10">${shuffled.map(opt => `<button onclick="checkGreetingAnswer(this, '${opt}')" class="greeting-option p-5 text-xl font-bold rounded-2xl bg-white border-2 border-purple-100 text-purple-600 option-btn uppercase">${opt}</button>`).join('')}</div></div>`;
            speak(data.prompt);
        }
        function checkGreetingAnswer(btn, selected) {
            const data = greetingData[greetingIdx];
            if (selected === data.correct) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                document.getElementById('userReplyArea').classList.remove('opacity-40');
                document.getElementById('replyText').innerText = data.correct + "!";
                speak(data.correct, () => {
                    setTimeout(() => {
                        greetingIdx++;
                        if (greetingIdx < greetingData.length) renderGreetingStep();
                        else finishGreetings();
                    }, 1500);
                });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }
        function finishGreetings() {
            document.getElementById('greetingsContainer').innerHTML = `<div class="flex flex-col items-center justify-center py-20 animate-fade-in"><div class="text-9xl mb-6">💬</div><h3 class="text-4xl font-bold text-purple-600 uppercase">Super Chat!</h3><button onclick="startGreetingsGame()" class="mt-10 px-14 py-6 bg-purple-500 text-white rounded-full font-bold text-2xl shadow-xl btn-bounce uppercase">Play Again</button></div>`;
            speak("Super! You are a great talker!");
        }

        // --- Lesson 1: 玩耍时间 (移除了 Swing) ---
        let playStep = 0;
        const playData = [
            { icon: '🧱', sentence: "I am playing with <span class='highlight-text'>______</span>.", full: "I am playing with blocks.", options: ['blocks', 'puzzles'], correct: 'blocks' },
            { icon: '🧩', sentence: "I am playing with <span class='highlight-text'>______</span>.", full: "I am playing with puzzles.", options: ['puzzles', 'sand'], correct: 'puzzles' },
            { icon: '🛝', sentence: "I am playing on the <span class='highlight-text'>______</span>.", full: "I am playing on the slide.", options: ['slide', 'blocks'], correct: 'slide' },
            { icon: '🏖️', sentence: "I am playing with <span class='highlight-text'>______</span>.", full: "I am playing with sand.", options: ['sand', 'puzzles'], correct: 'sand' }
        ];
        function startPlayTimeGame() { playStep = 0; renderPlayStep(); }
        function renderPlayStep() {
            const container = document.getElementById('playTimeContainer');
            const data = playData[playStep];
            const shuffled = shuffleArray(data.options);
            container.innerHTML = `<div class="text-center space-y-6 py-4 flex flex-col h-full animate-fade-in"><p class="text-gray-400 font-bold uppercase text-xs">Step ${playStep + 1}/4</p><div class="flex justify-center mt-2"><div class="text-8xl p-8 bg-white rounded-full shadow-lg border-2 border-green-50">${data.icon}</div></div><div class="p-6 bg-green-50 rounded-[30px] mx-2 border-2 border-green-100" id="playTextContainer"><p id="playSentence" class="text-2xl font-bold leading-relaxed">${data.sentence}</p></div><div class="grid grid-cols-2 gap-4 px-4 pb-8 mt-auto">${shuffled.map(opt => `<button onclick="checkPlayAnswer(this, '${opt}')" class="play-option-btn p-5 text-xl font-bold rounded-2xl bg-white border-2 border-gray-100 uppercase option-btn">${opt}</button>`).join('')}</div></div>`;
            speak(data.full);
        }
        function checkPlayAnswer(btn, selected) {
            const data = playData[playStep];
            if (selected === data.correct) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                document.getElementById('playSentence').innerHTML = data.full;
                speak(data.full, () => {
                    setTimeout(() => {
                        playStep++;
                        if (playStep < playData.length) renderPlayStep();
                        else finishPlayTime();
                    }, 1200);
                });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }
        function finishPlayTime() {
            document.getElementById('playTimeContainer').innerHTML = `<div class="text-center py-20 flex-grow flex flex-col justify-center animate-fade-in"><div class="text-9xl mb-6">🏆</div><h2 class="text-4xl font-bold text-green-600 uppercase">Great!</h2><button onclick="startPlayTimeGame()" class="mx-auto mt-8 px-14 py-6 bg-green-500 text-white rounded-full font-bold text-2xl shadow-xl btn-bounce uppercase">Play Again</button></div>`;
            speak("Fantastic job! You did it!");
        }

        // --- Lesson 1: 心情与颜色 ---
        let quizIdx = 0;
        const quizQuestions = [
            { img: '😊', q: 'How do you feel?', options: ['Happy', 'Sad'], correct: 'Happy' },
            { img: '👌', q: 'How do you feel?', options: ['Fine', 'Sad'], correct: 'Fine' },
            { img: '😢', q: 'How do you feel?', options: ['Happy', 'Sad'], correct: 'Sad' },
            { img: '😰', q: 'How do you feel?', options: ['Nervous', 'Fine'], correct: 'Nervous' }
        ];
        function startQuiz() { quizIdx = 0; renderQuizQ(); }
        function renderQuizQ() {
            const container = document.getElementById('quizContainer');
            const q = quizQuestions[quizIdx];
            const shuffled = shuffleArray(q.options);
            container.innerHTML = `<div class="w-full animate-fade-in"><div class="text-9xl mb-8 bg-yellow-50 w-44 h-44 flex items-center justify-center rounded-full mx-auto shadow-inner">${q.img}</div><h3 class="text-3xl font-bold mb-8 text-gray-700 uppercase">How do you feel?</h3><div class="grid grid-cols-1 gap-4 w-full px-4">${shuffled.map(opt => `<button onclick="checkQuizAnswer(this, '${opt}', '${q.correct}')" class="quiz-btn option-btn p-5 text-2xl font-bold rounded-[30px] bg-white border-2 border-blue-100 text-blue-600 uppercase">${opt}</button>`).join('')}</div></div>`;
            speak("How do you feel?");
        }
        function checkQuizAnswer(btn, selected, correct) {
            if (selected === correct) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                const text = selected === "Fine" ? "I am fine, thank you" : "I feel " + selected;
                speak(text, () => {
                    setTimeout(() => {
                        quizIdx++;
                        if (quizIdx < quizQuestions.length) renderQuizQ();
                        else finishQuiz();
                    }, 1200);
                });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }
        function finishQuiz() {
            document.getElementById('quizContainer').innerHTML = `<div class="py-20 animate-fade-in"><div class="text-9xl mb-6">⭐</div><h3 class="text-4xl font-bold text-blue-600 uppercase">Great Job!</h3><button onclick="startQuiz()" class="mt-10 px-12 py-5 bg-blue-500 text-white rounded-full font-bold text-xl shadow-lg btn-bounce uppercase">Play Again</button></div>`;
            speak("Great job! You know your feelings!");
        }

        let colorIdx = 0;
        const colorQuestions = [{ hex: '#FF0000', name: 'Red', options: ['Red', 'Green'] }, { hex: '#FFA500', name: 'Orange', options: ['Orange', 'Pink'] }, { hex: '#FFFF00', name: 'Yellow', options: ['Yellow', 'Violet'] }, { hex: '#008000', name: 'Green', options: ['Green', 'Blue'] }, { hex: '#0000FF', name: 'Blue', options: ['Indigo', 'Blue'] }, { hex: '#4B0082', name: 'Indigo', options: ['Indigo', 'Black'] }, { hex: '#EE82EE', name: 'Violet', options: ['Violet', 'Grey'] }, { hex: '#000000', name: 'Black', options: ['Black', 'Blue'] }, { hex: '#FFFFFF', name: 'White', options: ['White', 'Grey'] }, { hex: '#808080', name: 'Grey', options: ['Black', 'Grey'] }];
        function startColorsGame() { colorIdx = 0; renderColorQ(); }
        function renderColorQ() {
            const container = document.getElementById('colorsContainer');
            const c = colorQuestions[colorIdx];
            const shuffled = shuffleArray(c.options);
            container.innerHTML = `<div class="w-full animate-fade-in"><p class="text-gray-400 mb-2 font-bold uppercase text-sm">Color ${colorIdx+1}/10</p><div class="w-48 h-48 rounded-full mx-auto mb-10 shadow-lg border-4 border-white" style="background-color: ${c.hex}"></div><h3 class="text-3xl font-bold mb-8 text-gray-700 uppercase">What color is this?</h3><div class="grid grid-cols-1 gap-4 w-full px-4">${shuffled.map(opt => `<button onclick="checkColorAnswer(this, '${opt}', '${c.name}')" class="color-btn option-btn p-5 text-2xl font-bold rounded-[30px] bg-white border-2 border-pink-100 text-pink-600 uppercase">${opt}</button>`).join('')}</div></div>`;
            speak("What color is this?");
        }
        function checkColorAnswer(btn, selected, correct) {
            if (selected === correct) {
                btn.classList.add('bg-pink-500', 'text-white', 'border-pink-600');
                speak("It is " + selected, () => {
                    setTimeout(() => {
                        colorIdx++;
                        if (colorIdx < colorQuestions.length) renderColorQ();
                        else finishColors();
                    }, 1200);
                });
            } else { showFeedback("Try again!", "bg-gray-400"); speak("Try again"); }
        }
        function finishColors() {
            document.getElementById('colorsContainer').innerHTML = `<div class="py-20 animate-fade-in"><div class="text-9xl mb-6">🌈</div><h3 class="text-4xl font-bold text-pink-600 uppercase">Color Master!</h3><button onclick="startColorsGame()" class="mt-10 px-12 py-5 bg-pink-500 text-white rounded-full font-bold text-xl shadow-lg btn-bounce uppercase">Play Again</button></div>`;
            speak("You are a color master! Fantastic job!");
        }

        // --- Lesson 2: Body Parts ---
        let bodyStep = 0;
        const bodyData = [
            { icon: '💆', q: "What is this?", sentence: "This is my <span class='highlight-text'>______</span>.", full: "What is this? This is my head.", options: ['head', 'shoulders'], correct: 'head' },
            { icon: '💪', q: "What are these?", sentence: "These are my <span class='highlight-text'>______</span>.", full: "What are these? These are my arms.", options: ['arms', 'legs'], correct: 'arms' },
            { icon: '👋', q: "What are these?", sentence: "These are my <span class='highlight-text'>______</span>.", full: "What are these? These are my hands.", options: ['hands', 'feet'], correct: 'hands' },
            { icon: '🖐️', q: "What are these?", sentence: "These are my <span class='highlight-text'>______</span>.", full: "What are these? These are my fingers.", options: ['fingers', 'toes'], correct: 'fingers' },
            { icon: '🦵', q: "What are these?", sentence: "These are my <span class='highlight-text'>______</span>.", full: "What are these? These are my legs.", options: ['legs', 'arms'], correct: 'legs' },
            { icon: '👣', q: "What are these?", sentence: "These are my <span class='highlight-text'>______</span>.", full: "What are these? These are my feet.", options: ['feet', 'hands'], correct: 'feet' },
            { icon: '🤷', q: "What are these?", sentence: "These are my <span class='highlight-text'>______</span>.", full: "What are these? These are my shoulders.", options: ['shoulders', 'knees'], correct: 'shoulders' }
        ];
        function startBodyPartsGame() { bodyStep = 0; renderBodyStep(); }
        function renderBodyStep() {
            const container = document.getElementById('bodyPartsContainer');
            const data = bodyData[bodyStep];
            const shuffled = shuffleArray(data.options);
            container.innerHTML = `<div class="text-center space-y-6 py-2 flex flex-col h-full animate-fade-in"><p class="text-gray-400 font-bold uppercase text-xs tracking-widest">Part ${bodyStep + 1}/7</p><div class="flex justify-center"><div class="text-9xl p-10 bg-white rounded-full shadow-lg border-4 border-blue-100">${data.icon}</div></div><h3 class="text-2xl font-bold text-blue-800 uppercase italic">${data.q}</h3><div class="p-6 bg-blue-50 rounded-[30px] mx-2 border-2 border-blue-100" id="bodyTextContainer"><p id="bodySentence" class="text-2xl font-bold leading-relaxed">${data.sentence}</p></div><div class="grid grid-cols-2 gap-4 px-4 pb-6 mt-auto">${shuffled.map(opt => `<button onclick="checkBodyAnswer(this, '${opt}')" class="body-option-btn p-5 text-xl font-bold rounded-2xl bg-white border-2 border-gray-100 uppercase option-btn">${opt}</button>`).join('')}</div></div>`;
            speak(data.full);
        }
        function checkBodyAnswer(btn, selected) {
            const data = bodyData[bodyStep];
            if (selected === data.correct) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                document.getElementById('bodySentence').innerHTML = data.full.split('?')[1].trim();
                speak(data.full, () => {
                    setTimeout(() => {
                        bodyStep++;
                        if (bodyStep < bodyData.length) renderBodyStep();
                        else finishBodyParts();
                    }, 1500);
                });
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }
        function finishBodyParts() {
            document.getElementById('bodyPartsContainer').innerHTML = `<div class="text-center py-20 animate-fade-in"><div class="text-9xl mb-6">🥇</div><h2 class="text-4xl font-bold text-blue-600 uppercase">Body Master!</h2><button onclick="startBodyPartsGame()" class="mx-auto mt-8 px-14 py-6 bg-blue-500 text-white rounded-full font-bold text-2xl shadow-xl btn-bounce uppercase">Play Again</button></div>`;
            speak("Well done! You know your body!");
        }

        // --- Lesson 2: 脸部拼图 ---
        const facePartsData = [
            { id: 'hair', name: 'hair', icon: '💇' },
            { id: 'eyes-left', name: 'eyes', icon: '👀' },
            { id: 'eyes-right', name: 'eyes', icon: '👀' },
            { id: 'eyebrow-left', name: 'eyebrow', icon: '〰️' },
            { id: 'eyebrow-right', name: 'eyebrow', icon: '〰️' },
            { id: 'nose', name: 'nose', icon: '👃' },
            { id: 'ears-left', name: 'ears', icon: '👂' },
            { id: 'ears-right', name: 'ears', icon: '👂' },
            { id: 'mouth', name: 'mouth', icon: '👄' },
            { id: 'tongue', name: 'tongue', icon: '👅' }
        ];
        let faceQueue = [];
        let currentPartToFind = null;
        function startMyFaceGame() {
            const zones = document.querySelectorAll('.target-zone'); zones.forEach(z => z.innerHTML = '');
            faceQueue = shuffleArray(['hair', 'eyebrow', 'eyes', 'ears', 'nose', 'mouth', 'tongue']);
            renderPartBin(); nextFacePart();
        }
        function renderPartBin() {
            const bin = document.getElementById('partBin'); bin.innerHTML = '';
            const allItems = shuffleArray([...facePartsData]);
            allItems.forEach(item => {
                const el = document.createElement('div');
                el.className = `face-part hover:scale-110 active:scale-95 transition-all`;
                if (item.id === 'hair') el.classList.add('w-24');
                el.id = `part-${item.id}`; el.innerHTML = item.icon;
                el.onclick = () => handlePartClick(item); bin.appendChild(el);
            });
        }
        function nextFacePart() {
            if (faceQueue.length === 0) {
                document.getElementById('facePrompt').innerText = "Perfect! 🥳";
                speak("Perfect! You have a beautiful face!"); showFeedback("Great!", "bg-orange-500"); return;
            }
            currentPartToFind = faceQueue.shift();
            document.getElementById('facePrompt').innerText = "FIND: " + currentPartToFind.toUpperCase();
            speak(currentPartToFind);
        }
        function handlePartClick(item) {
            if (item.name === currentPartToFind) {
                placePartOnFace(item);
                const siblings = facePartsData.filter(p => p.name === item.name);
                const allPlaced = siblings.every(s => document.getElementById(`part-${s.id}`).classList.contains('placed'));
                showFeedback("Yes!", "bg-green-500");
                if (allPlaced) { setTimeout(nextFacePart, 800); } else { speak(item.name); }
            } else { showFeedback("Try again!", "bg-red-400"); speak("Try again"); }
        }
        function placePartOnFace(item) {
            const partEl = document.getElementById(`part-${item.id}`);
            partEl.classList.add('placed');
            const targetZone = document.getElementById(`target-${item.id}`);
            if (targetZone) { targetZone.innerHTML = `<span class="fade-in">${item.icon}</span>`; }
        }

        function showFeedback(text, colorClass) {
            const fb = document.getElementById('feedback'); fb.innerText = text;
            fb.className = `fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 px-10 py-5 rounded-full text-white font-bold text-3xl transition-all ${colorClass} opacity-100 z-[999] shadow-2xl`;
            setTimeout(() => fb.classList.replace('opacity-100', 'opacity-0'), 1500);
        }

        // 初始页面显示
        showView('lessonMenu');
    </script>
</body>
</html>
